[build-system]
requires = [ "setuptools",]
build-backend = "setuptools.build_meta"

[project]
name = "megaPLuG"
readme = "README.md"
dynamic = [ "dependencies", "version",]

[project.scripts]
epa-phase-iii = "megaPLuG.__main__:main"

[project.optional-dependencies]
docs = [ "docutils<0.18.0", "sphinx~=3.4.3", "sphinx_rtd_theme==0.5.1", "nbsphinx==0.8.1", "sphinx-autodoc-typehints==1.11.1", "sphinx_copybutton==0.3.1", "ipykernel>=5.3, <7.0", "Jinja2<3.1.0", "myst-parser~=0.17.2",]

[tool.kedro]
package_name = "megaPLuG"
project_name = "EPA Phase III"
kedro_init_version = "0.19.1"
tools = "['Linting', 'Documentation', 'Data Structure', 'PySpark', 'Kedro Viz']"

[tool.ruff]
line-length = 88
show-fixes = true
select = [ "F", "W", "E", "I", "UP", "PL", "T201",]
ignore = [ "E501",]

[project.entry-points."kedro.hooks"]

[tool.setuptools.dynamic.dependencies]
file = "requirements.txt"

[tool.setuptools.dynamic.version]
attr = "megaPLuG.__version__"

[tool.setuptools.packages.find]
where = [ "src",]
namespaces = false
