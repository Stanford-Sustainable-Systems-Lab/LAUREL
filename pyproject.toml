[project]
name = "megaPLuG"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "Fletcher Passow", email = "fletcherpassow@icloud.com" }
]
dependencies = [
    "arviz~=0.16.1",
    "black~=22.0",
    "cvxpy~=1.4",
    "dask~=2023.12",
    "geopandas~=0.14",
    "graphviz~=0.20.1",
    "h3~=3.7.6",
    "ipython~=8.10 ; python_version >= '3.8'",
    "jupyter~=1.0",
    "jupyterlab~=3.0",
    "jupyterlab_server>=2.11.1",
    "kedro~=0.19.2",
    "kedro-datasets[pandas.CSVDataset,pandas.FeatherDataset,matplotlib.MatplotlibWriter,dask.ParquetDataset]>=1.0",
    "kedro-telemetry>=0.3.1",
    "kedro-viz>=6.7.0",
    "numpyro~=0.13.0",
    "pandas~=2.2.0",
    "pre-commit~=3.6.0",
    "ruff~=0.0.290",
    "scikit-learn~=1.0",
    "seaborn~=0.12.1",
    "tensorflow-probability~=0.20.1",
]
readme = "README.md"
requires-python = ">= 3.8"

[project.scripts]
megaPLuG = "megaPLuG.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = []

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/megaplug"]

[tool.kedro]
package_name = "megaPLuG"
project_name = "megaPLuG"
kedro_init_version = "0.19.1"
tools = "['Linting', 'Documentation', 'Data Structure', 'PySpark', 'Kedro Viz']"

[tool.ruff]
line-length = 88
show-fixes = true
lint.select = [ "F", "W", "E", "I", "UP", "PL", "T201",]
lint.ignore = [ "E501",]

[project.entry-points."kedro.hooks"]