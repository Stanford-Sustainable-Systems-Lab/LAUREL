# Raw datasets
navistar:
  type: dask.ParquetDataset
  filepath: data/01_raw/Navistar/stanford_dataset_v2/

vius_home_base_state_raw:
  type: text.TextDataset
  filepath: data/01_raw/VIUS/vius_home_base_state_url.txt

vius_weight_class_raw:
  type: text.TextDataset
  filepath: data/01_raw/VIUS/vius_weight_class_url.txt

state_boundaries:
  type: megaPLuG.datasets.geodatabase.GeoDataBaseDataset
  filepath: data/01_raw/Census_Geographies/cb_2023_us_all_20m.gdb
  load_args:
    layer: cb_2023_us_state_20m

# Preprocessed datasets
dwells:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/dwells.feather

dwells_with_locations:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/dwells_with_locations.feather

vehicles_raw:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicles_raw.feather

vehicles_labelled:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicles_labelled.feather

vehicle_location_pairs:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicle_location_pairs.feather

vehicle_location_pairs_clustered:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicle_location_pairs_clustered.feather

vehicle_location_pairs_labelled:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicle_location_pairs_labelled.feather

vius_home_base_state:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/VIUS/vius_home_base_state.feather

vius_weight_class:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/VIUS/vius_weight_class.feather

# Electrification simulation datasets
vehicles_evaluated_partition:
  type: partitions.PartitionedDataset
  path: data/07_model_output/vehicles_evaluated
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

dwells_with_charging_partition:
  type: partitions.PartitionedDataset
  path: data/07_model_output/dwells_with_charging
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

events_partition:
  type: partitions.PartitionedDataset
  path: data/07_model_output/events
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

# Reporting datasets
report_by_hex:
  type: pandas.CSVDataset
  filepath: data/08_reporting/report_by_hex.csv
  save_args:
    index: True

report_by_hex_with_geoms:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/08_reporting/report_by_hex.gpkg
  save_args:
    layer: peak_kw

# Test datasets
vehicle_representative_points:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/07_model_output/veh_rep_pts.gpkg
  save_args:
    index: True
    layer: vehicle_representative_points

vehicle_dwells:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/07_model_output/veh_dwells.gpkg
  save_args:
    index: True
    layer: vehicle_dwells

vehicle_depots:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicle_depots.feather

vehicle_depots_geoms:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/07_model_output/vehicle_depots.gpkg
  save_args:
    index: True
    layer: vehicle_depots
  load_args:
    layer: vehicle_depots

vehicle_trajectory:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/07_model_output/vehicle_trajectory.gpkg
  save_args:
    index: True
    layer:
      - dwells
      - trips
    
navistar_by_state:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/07_model_output/navistar_by_state.gpkg
  save_args:
    index: True
    layer: geometry

### Scenario configurations
scenario_configs:
  type: partitions.PartitionedDataset
  path: conf/scenarios
  dataset:
    type: yaml.YAMLDataset
  filename_suffix: ".yml"

### Slurm batch scripts
scenario_slurm_script:
  type: partitions.PartitionedDataset
  path: src/runners
  dataset:
    type: text.TextDataset
  filename_suffix: ".sh"