# Raw datasets
navistar:
  type: dask.ParquetDataset
  filepath: data/01_raw/Navistar/stanford_dataset_v2/

vius_home_base_state_raw:
  type: text.TextDataset
  filepath: data/01_raw/VIUS/vius_home_base_state_url.txt

vius_weight_class_raw:
  type: text.TextDataset
  filepath: data/01_raw/VIUS/vius_weight_class_url.txt

state_boundaries:
  type: megaPLuG.datasets.geodatabase.GeoDataBaseDataset
  filepath: data/01_raw/Census_Geographies/cb_2023_us_all_500k.gdb
  load_args:
    layer: cb_2023_us_state_500k

substation_boundaries:
  type: megaPLuG.datasets.geodatabase.GeoDataBaseDataset
  filepath: data/01_raw/ICA_Maps/PGE/GRIP_FGDB/GNA.gdb
  load_args:
    layer: DFSubstationArea___PeakFacilityLoadingPercent

substation_profiles:
  type: megaPLuG.datasets.geodatabase.GeoDataBaseDataset
  filepath: data/01_raw/ICA_Maps/PGE/GRIP_FGDB/ICA.gdb
  load_args:
    layer: SubstationLoadProfile
    columns:
      - SubID
      - SubName
      - MonthHour
      - Low
      - High

urban_areas:
  type: megaPLuG.datasets.shapefile.ShapefileDataset
  filepath: data/01_raw/Census_Geographies/tl_2020_us_uac20_corrected/tl_2020_us_uac20_corrected.shp

highways:
  type: megaPLuG.datasets.geodatabase.GeoDataBaseDataset
  filepath: data/01_raw/Census_Geographies/north_american_roads_2024.gdb
  load_args:
    layer: North_American_Roads

# Preprocessed datasets
dwells:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/dwells.feather

dwells_with_locations:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/dwells_with_locations.feather

vehicles_raw:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicles_raw.feather

vehicles_labelled:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicles_labelled.feather

vehicle_location_pairs:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicle_location_pairs.feather

vehicle_location_pairs_clustered:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicle_location_pairs_clustered.feather

vehicle_location_pairs_labelled:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vehicle_location_pairs_labelled.feather

hex_region_corresp:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/hex_region_corresp.feather

vius_home_base_state:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/VIUS/vius_home_base_state.feather

vius_weight_class:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/VIUS/vius_weight_class.feather

vius_scaling:
  type: pandas.FeatherDataset
  filepath: data/02_intermediate/vius_scaling.feather

# Electrification simulation datasets
dwells_with_charging_partition:
  type: partitions.PartitionedDataset
  path: "${runtime_params:partition_data_dir, 'data/07_model_output'}/dwells_with_charging"
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

vehicles_with_params_partition:
  type: partitions.PartitionedDataset
  path: "${runtime_params:partition_data_dir, 'data/07_model_output'}/vehicles_with_params"
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

vehicles_evaluated_partition:
  type: partitions.PartitionedDataset
  path: "${runtime_params:partition_data_dir, 'data/07_model_output'}/vehicles_evaluated"
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

report_by_region_peaks_partition:
  type: partitions.PartitionedDataset
  path: "${runtime_params:partition_data_dir, 'data/07_model_output'}/report_by_region_peaks"
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

report_by_region_quantiles_partition:
  type: partitions.PartitionedDataset
  path: "${runtime_params:partition_data_dir, 'data/07_model_output'}/report_by_region_quantiles"
  dataset:
    type: pandas.FeatherDataset
  filename_suffix: ".feather"

report_by_region_peaks_with_geoms:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/07_model_output/report_by_region_single_run.gpkg
  save_args:
    layer: peak_kw

# Test datasets
vehicle_representative_points:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/03_primary/veh_rep_pts.gpkg
  save_args:
    index: True
    layer: vehicle_representative_points

vehicle_dwells:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/03_primary/veh_dwells.gpkg
  save_args:
    index: True
    layer: vehicle_dwells

vehicle_depots:
  type: pandas.FeatherDataset
  filepath: data/03_primary/vehicle_depots.feather

vehicle_depots_geoms:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/03_primary/vehicle_depots.gpkg
  save_args:
    index: True
    layer: vehicle_depots
  load_args:
    layer: vehicle_depots

clusterable_veh_locs:
  type: pandas.FeatherDataset
  filepath: data/04_feature/clusterable_veh_locs.feather

profiles:
  type: pandas.FeatherDataset
  filepath: data/04_feature/profiles.feather

canonical_veh_locs:
  type: pandas.CSVDataset
  filepath: data/03_primary/canonical_veh_locs.csv

# Reporting datasets
vehicle_trajectory:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/08_reporting/vehicle_trajectory.gpkg
  save_args:
    index: True
    layer:
      dwells: dwells
      trips: trips
    
navistar_by_state:
  type: megaPLuG.datasets.geopackage.GeoPackageDataset
  filepath: data/08_reporting/navistar_by_state.gpkg
  save_args:
    index: True
    layer: navistar_by_state

### Scenario configurations
scenario_configs:
  type: partitions.PartitionedDataset
  path: conf/scenarios
  dataset:
    type: yaml.YAMLDataset
  filename_suffix: ".yml"

### Slurm batch scripts
scenario_slurm_script:
  type: partitions.PartitionedDataset
  path: src/runners
  dataset:
    type: text.TextDataset
  filename_suffix: ".sh"