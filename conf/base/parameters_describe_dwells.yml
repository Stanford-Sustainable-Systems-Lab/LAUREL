# Parameters for the ``describe_dwells`` pipeline (Model Module 2: Augment Dwell Data).
#
# This pipeline transforms raw telematics trips into a dwell dataset: it formats
# columns, derives trip-level statistics, coalesces spurious short dwells, marks
# driver shift boundaries, and clusters recurring vehicle–location pairs to assign
# each dwell a location type (depot, truck stop, or other).
#
# Dask is used for parallelism. The code is NOT thread-safe (Numba JIT), so
# ``processes: True`` and ``threads_per_worker: 1`` are required.
#
# Documentation: https://docs.kedro.org/en/stable/configuration/parameters.html

format_columns:
  time_columns:
    - start_timestamp_utc
    - end_timestamp_utc
  category_columns:
    - vehicle_id
    - veh_type
    - vin_gvw
  h3_columns:
    - starting_h3_8
    - ending_h3_8
  col_renamer:
    veh_id: vehicle_id
  veh_id_col: veh_id
  persist: False

trip_derived_cols:
  time_cols:
    trip_start: start_timestamp_utc
    trip_end: end_timestamp_utc
  persist: False

dask_describe_dwells:
  use_dask: True
  cluster:
    n_workers: 4           # Tune to available CPU cores
    processes: True        # Must be True; code is not thread-safe due to Numba JIT
    threads_per_worker: 1  # Must stay at 1; do not increase
    memory_limit: 16GiB    # Tune to available RAM; 8 GiB is sufficient on a laptop for typical datasets

create_dwells:
  debug_subsample:
    active: False   # Set to True and reduce n to speed up development runs
    n: 1000
  drop_cols:
    - starting_h3_8
    - vin_gvw
    - veh_type
  col_renamer:
    hex_id: ending_h3_8
  from_trips_cols:
    veh: veh_id
    hex: hex_id
    start_trip: start_timestamp_utc
    end_trip: end_timestamp_utc
    trip_dist: trip_miles
    trip_dur: trip_hrs
  set_index_kwargs:
    partition_size: 104857600  # 100 MiB in bytes; controls Dask partition size after re-indexing
  verify_sorting: False
  load_into_memory: False

coalesce_interrupted_dwells:
  # Merges pairs of consecutive dwells at the same hex that are separated by a
  # very short trip. These arise from GPS noise or brief loop trips that should
  # not break a dwell into two.
  max_short_dist_miles: 0.62  # ~1 km, the longest diagonal across an H3 res-8 hex (~460 m diameter)
  max_short_dur_hrs: 0.1      # 6 minutes; pairs with distance threshold above
  inplace: True

rolling_dwell_ratios:
  # Computes a 28-day rolling ratio of dwell duration to detect locations where
  # a vehicle spends a large fraction of its time — used downstream to identify
  # depot-like locations for vehicle-specific depot assignment.
  rolling_kwargs:
    window: 28d
    center: True
    closed: both
  output_ratio_col: max_dwell_hrs_roll_ratio

map_location_groups:
  location_group_col: loc_group_id
  missing_values:
    fill_missing: False
    fill_value: ${group_hexes.clusterer_kwargs.n_clusters}  # Cluster ID for unclassified hexes

mark_vehicle_shifts:
  # Identifies driver shift boundaries using the FMCSA hours-of-service rule:
  # a rest period of ≥10 consecutive hours (here approximated as ≥6.9 hrs,
  # slightly below the 7-hour mandatory sleeper-berth minimum, to tolerate
  # telematics gaps). Must match ``min_refresh_hrs`` in parameters_electrify_trips.yml.
  columns:
    refresh: is_refresh
    dur: dwell_time_hrs
    shift_id: shift_id
  min_refresh_hrs: 6.9  # FMCSA minimum sleeper berth time (7 hrs) minus a small tolerance

cluster_veh_loc_pairs:
  # Clusters vehicle–location pairs by visit patterns to distinguish depot-like
  # locations (frequent, long dwells) from incidental stops.
  min_cluster_size_denom: 200  # min_cluster_size = n_obs / this value; larger values yield smaller minimum clusters
  sample:
    active: False
    n: 10000
    seed: 42
  feature_cols:
    - mean_inter_miles
    - med_inter_miles
    - max_inter_miles
    - mean_inter_times
    - med_inter_times
    - max_inter_times
    - med_dwell_hrs
    - dwell_hrs_ratio
    - visits_ratio
  cluster_col: cluster
