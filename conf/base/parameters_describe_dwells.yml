# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/1.0.0/configuration/parameters.html

dask_describe_dwells:
  use_dask: True
  cluster:
    n_workers: 4
    processes: True
    threads_per_worker: 1 # Must stay at 1, since our code is not thread safe
    memory_limit: 8GiB

create_dwells:
  debug_subsample:
    active: False
    n: 1000
  drop_cols:
    - starting_h3_8
    - vin_gvw
    - veh_type
  col_renamer:
    hex_id: ending_h3_8
  from_trips_cols:
    veh: veh_id
    hex: hex_id
    start_trip: start_timestamp_utc
    end_trip: end_timestamp_utc
    trip_dist: trip_miles
    trip_dur: trip_hrs
  set_index_kwargs:
    partition_size: 104857600 # which is 100MiB in bytes
  verify_sorting: False
  load_into_memory: False

coalesce_interrupted_dwells:
    max_short_dist_miles: 0.62 # 1 kM, the longest distance across an h3 res 8 hex
    max_short_dur_hrs: 0.1 # 6 minutes
    inplace: True

rolling_dwell_ratios:
  rolling_kwargs:
    window: 28d
    center: True
    closed: both
  output_ratio_col: max_dwell_hrs_roll_ratio

map_location_groups:
  location_group_col: cluster_id
  missing_values:
    fill_missing: False
    fill_value: ${cluster_hexes.clusterer_kwargs.n_clusters}

cluster_veh_loc_pairs:
  min_cluster_size_denom: 200 # [n_obs]/[this number] gives the minimum cluster size 
  sample:
    active: False
    n: 10000
    seed: 42
  feature_cols:
    - mean_inter_miles
    - med_inter_miles
    - max_inter_miles
    - mean_inter_times
    - med_inter_times
    - max_inter_times
    - med_dwell_hrs
    - dwell_hrs_ratio
    - visits_ratio
  cluster_col: cluster