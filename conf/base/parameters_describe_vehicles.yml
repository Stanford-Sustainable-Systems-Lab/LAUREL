# This is a boilerplate parameters config generated for pipeline 'describe_vehicles'
# using Kedro 0.19.3.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.3/configuration/parameters.html

substantial_dwells:
  thresh_hrs: 4
  drop_cols:
    - trip_hrs
    - trip_avg_speed_mph

operating_segment:
  radius_bin_low_bounds_miles:
    local: 0
    regional: 100
    long-haul: 300
  segment_col: op_segment

cluster_veh_loc_pairs:
  min_cluster_size_denom: 200 # [n_obs]/[this number] gives the minimum cluster size 
  sample:
    active: False
    n: 10000
    seed: 42
  feature_cols:
    - mean_inter_miles
    - med_inter_miles
    - max_inter_miles
    - mean_inter_times
    - med_inter_times
    - max_inter_times
    - med_dwell_hrs
    - dwell_hrs_ratio
    - visits_ratio
  cluster_col: cluster

label_veh_loc_pairs:
  location:
    id_cols:
      cluster: cluster
    vals:
      2: home_base

classify_vehicles:
  veh_col: veh_id
  loc_col: location

mark_locations:
  veh_loc_cols:
    - location

weight_class_group:
  id_columns:
    - vin_gvw
  value_col: gvw_class
  values:
    1: Light Duty (Classes 1 and 2)
    2: Light Duty (Classes 1 and 2)
    3: Medium Duty (Classes 3, 4, 5, and 6)
    4: Medium Duty (Classes 3, 4, 5, and 6)
    5: Medium Duty (Classes 3, 4, 5, and 6)
    6: Medium Duty (Classes 3, 4, 5, and 6)
    7: Medium-Heavy Duty (Class 7)
    8: Heavy Duty (Class 8)

mark_location_regions:
  na_region_fill: "Any State (including No Home Base and Not Reported)"
  location_col: location
  location_region_col: home_base_state
  region_name_col: NAME

vehicle_scaling_weights:
  group_cols:
   - home_base_state
   - gvw_class
  summaries:
    veh_id: nunique
  weight_col: weight
  totals_col: n_vehs