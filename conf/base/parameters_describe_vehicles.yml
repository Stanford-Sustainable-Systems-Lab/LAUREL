# This is a boilerplate parameters config generated for pipeline 'describe_vehicles'
# using Kedro 0.19.3.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.3/configuration/parameters.html

strip_vehicle_attrs:
  veh_id_col: veh_id
  veh_attr_cols:
    - veh_type
    - vin_gvw
  min_trips_per_veh: 2

substantial_dwells:
  thresh_hrs: 4
  drop_cols:
    - trip_hrs

observation_frames:
  column_namer:
    dist_traveled_col: total_obs_miles
    obs_time_col: obs_duration

classify_vehicles:
  veh_col: veh_id
  loc_col: location
  base_location_type: depot

prepare_shared_locations:
  col_renamer:
    hex_id: hex_id_park
  loc_col: location
  shared_location_type: truck_stop

merge_locations_shared:
  keep_right_columns:
    - hex_id
    - location
  merge_kwargs:
    how: left
    'on':
      - hex_id

merge_locations_vehicle_specific:
  keep_right_columns:
    - veh_id
    - hex_id
    - location
  merge_kwargs:
    how: left
    'on':
      - veh_id
      - hex_id
    suffixes:
      - _shared
      - _specific

mark_locations:
  veh_loc_cols: # Later columns take priority over earlier columns on a per-vehicle basis
    - location_shared
    - location_specific
  loc_col_out: location
  na_fill: other

weight_class_group:
  id_columns:
    - vin_gvw
  value_col: gvw_class
  values:
    1: Light Duty (Classes 1 and 2)
    2: Light Duty (Classes 1 and 2)
    3: Medium Duty (Classes 3, 4, 5, and 6)
    4: Medium Duty (Classes 3, 4, 5, and 6)
    5: Medium Duty (Classes 3, 4, 5, and 6)
    6: Medium Duty (Classes 3, 4, 5, and 6)
    7: Medium-Heavy Duty (Class 7)
    8: Heavy Duty (Class 8)

mark_vehicle_centers:
  sort_primary_locations_to_top:
    columns:
      - n_visits
    ascending:
      - False
  location_col: location
  base_location_type: depot
  home_base_col: home_base_hex
  nan_int: 0

operating_segment:
  home_base_col: ${mark_vehicle_centers.home_base_col}
  nan_int: ${mark_vehicle_centers.nan_int}
  proj_crs: EPSG:5070
  radius_bin_low_bounds_miles:
    "0-99 Miles": 0
    "100-249 Miles": 100
    "250-499 Miles": 250
    "500+ Miles": 500
  segment_col: primary_op_dist

mark_location_regions:
  na_region_fill: "No Home Base"
  location_region_col: home_base_state
  region_name_col: STUSPS
  home_base_col: ${mark_vehicle_centers.home_base_col}
  nan_int: ${mark_vehicle_centers.nan_int}
  veh_col: ${load_dwell_set.veh}