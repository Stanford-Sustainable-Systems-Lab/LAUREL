# This is a boilerplate parameters config generated for pipeline 'evaluate_impacts'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

geo_partition_eval:
  dir: pg_and_e

summarize_vehicles:
  dead_energy_col: dwell_init_kwh
  delay_hrs_col: dwell_init_delay_hrs
  delay_inc_hrs_col: delay_inc_hrs
  obs_duration_col: obs_duration
  dwell_dur_col: dwell_time_hrs
  charge_energy_col: charge_kwh
  quantiles:
    - 0.00
    - 0.05
    - 0.50
    - 0.95
    - 1.00
  refresh_col: is_refresh
  location_col: location
  refresh_locations:
  - depot
  summary_cols:
    delay_frac: delay_frac
    shift_dur: shift_dur_hrs
    shift_dur_delayed: shift_dur_delayed_hrs
    shift_dur_delayed_thresh: shift_dur_delayed_past_FMCSA
    shift_delay: shift_delay_hrs
    max_delay: max_delay_hrs
  drop_events_col: drop_events_all_reasons
  delay_frac_thresh_quantile: 0.95
  max_delay_thresh_quantile: 1.00
  shift_max_dur_hrs: 14 # From FMCSA hours of service regulations
  thresholds:
    pct_shifts_w_deaths_max: 0.05 # Maximum percentage of shifts with deaths from all causes
    delay_frac_max: 0.1 # Maximum time fraction of a single shift added by delay
    delay_hrs_max: 8 # Maximum accumulated delay at any point in vehicle's history

localize_time_from_hexes:
  time_cols_source:
    - time
  time_cols_local:
    - time_local
  sort_result: False
  sort_cols:
    - veh_id
    - time_local

filter_events:
  profile_cols:
    - hex_kw_diff
    - plugged_diff
  drop_events_col: drop_events_all_reasons
  drop_na_cols:
    - substation_id

build_slice_frame:
  columns_input:
    first_hex: obs_hex_first
    first_time: obs_time_first
    last_hex: obs_hex_last
    last_time: obs_time_last
  freq: 1d
  frame_cols:
    vehicle: veh_id
    time: slice_time_start

eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  timezone_col: tz
  time_col: time
  group_cols: None # Filled in by the specific modular pipeline settings
  profile_col: power_kw
  duration_col: duration

substation.group_columns:
    - substation_id

state_op_dist.group_columns:
    - state
    - primary_op_dist

stratify_columns: ${sample_slices.stratify_cols}

build_sampling_totals:
  totals_column: n_vehs_target
  filter_totals:
    filters:
      gvw_class:
        value_isin:
          - "8"
      scenario:
        value_isin:
          - Central
      is_mandate_active:
        value_isin:
          - True
      fuel_type:
        value_isin:
          - electricity
      year:
        value_isin:
          - 2030
    keep_only_filter_cols: False


assign_metadata_location:
  keep_right_columns:
    - hex_id
    # Other columns will be added at runtime
  merge_kwargs:
    how: left
    'on': hex_id # Using quotes here because "on" somehow gets interpreted as "True" without quotes
    validate: many_to_one

assign_metadata_vehicle:
  keep_right_columns:
    - veh_id
    - drop_events_all_reasons
    # Other columns will be added at runtime
  merge_kwargs:
    how: left
    'on': veh_id # Using quotes here because "on" somehow gets interpreted as "True" without quotes
    validate: many_to_one

slice_events:
    slice_freq: 1d
    power_col: hex_kw_diff
    slice_id_col: slice_time_start
    slice_time_col: slice_time_relative
    source_time_col: time_local
    bootstrap_id_col: bootstrap_id

dask_eval:
  cluster:
    n_workers: 4
    processes: True
    threads_per_worker: 1 # Must stay at 1, since our code is not thread safe
    memory_limit: 4GiB # For continental scale, workers had 16GiB and still spilled to disk
    # The actual managed memory was only about 1GiB per 15 bootstraps (loaded at beginning, probably is winds_mini)
    # In contrast, 350 bootstraps could be completed on 4GiB workers with no spilling

sample_slices:
    seed_for_seeds: 1
    n_bootstraps: 350
    stratify_cols:
      - home_base_state
      - primary_op_dist
    target_count_col: n_vehs_target
    discrete_freq: 15min
    skip_resampling: False

summarize_slices:
  discrete_freq: 15min
  quantiles:
    - 0.00
    - 0.05
    - 0.40
    - 0.50
    - 0.60
    - 0.95
    - 1.00
