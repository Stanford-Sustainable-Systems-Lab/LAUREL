# This is a boilerplate parameters config generated for pipeline 'evaluate_impacts'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

summarize_vehicles:
  dead_energy_col: dwell_init_kwh

eval_columns:
  hex_col: hex_id
  timezone_col: tz
  time_col: time
  group_cols:
    - substation_id
    - land_use
  profile_col: power_kw
  duration_col: duration

profiles_from_events:
  power_col: hex_kw_diff

report_by_region_peaks:
  local_time_attrs:
    - day_of_week
    - hour

report_by_region_quantiles:
  freq: 1h
  quantiles:
    - 0.00
    - 0.05
    - 0.40
    - 0.50
    - 0.60
    - 0.95
    - 1.00

add_region_geoms:
  hex_col: hex_id
  region_col: substation_id