# This is a boilerplate parameters config generated for pipeline 'evaluate_impacts'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

summarize_vehicles:
  dead_energy_col: dwell_init_kwh

eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  timezone_col: tz
  time_col: time
  group_cols:
    - substation_id
    - op_segment
  profile_col: power_kw
  duration_col: duration

substation.eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  timezone_col: tz
  time_col: time
  group_cols:
    - substation_id
  profile_col: power_kw
  duration_col: duration

land_op_segment.eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  timezone_col: tz
  time_col: time
  group_cols:
    - land_use
    - op_segment
  profile_col: power_kw
  duration_col: duration

op_segment.eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  timezone_col: tz
  time_col: time
  group_cols:
    - op_segment
    - state
  profile_col: power_kw
  duration_col: duration

jurisdiction.eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  timezone_col: tz
  time_col: time
  group_cols:
    - state
  profile_col: power_kw
  duration_col: duration

profiles_from_events:
  power_col: hex_kw_diff
  drop_null_groups: True

report_by_region_peaks:
  local_time_attrs:
    - day_of_week
    - hour

report_by_region_quantiles:
  freq: 1h
  quantiles:
    - 0.00
    - 0.05
    - 0.40
    - 0.50
    - 0.60
    - 0.95
    - 1.00

add_region_geoms:
  hex_col: hex_id
  region_col: substation_id

substation.report_by_region_capacity_consumed:
  freq: 1h
  prof_merge_cols:
    - substation_id
    - time_local_hour
  baseload_cols:
    hourly: max_base_by_hour_mw
    all_time: max_base_mw
    capacity_available: cap_avail_mw
  fill_with_zero_cols:
    - max_veh_mw
    - diff_mw_abs
    - diff_mw_pct
  vehicle_profile_conversion: 0.001 # Converts vehicle profiles in kW to MW
  