# Parameters for the ``evaluate_impacts`` pipeline (Model Modules 5 & 6).
#
# Module 5 (expected dwell estimation): estimates the expected number of
# electrified dwells per TAZ on a typical weekday by fusing SoW adoption rates
# with freight-activity-class-specific vehicle visit statistics from the
# observed data. Uses logistic regression with a correction term.
#
# Module 6 (load profile assembly): bootstrap-samples electrified dwells
# (default 100 draws, 95th percentile) to assemble 30-minute load profiles
# for each TAZ, aggregates across TAZs in each substation territory, and saves
# quantile summaries.
#
# This is the most memory-intensive pipeline. Dask is used for parallelism.
# The code is NOT proven thread-safe (Numba JIT), so ``processes: True`` and
# ``threads_per_worker: 1`` are required.
#
# Documentation: https://docs.kedro.org/en/stable/configuration/parameters.html

summarize_vehicles:
  # Computes per-vehicle operability statistics (delay, death rate) that are
  # used to flag infeasible scenarios before assembling load profiles.
  dead_energy_col: dwell_init_kwh
  delay_hrs_col: dwell_init_delay_hrs
  delay_inc_hrs_col: delay_inc_hrs
  obs_duration_col: obs_duration
  dwell_dur_col: dwell_time_hrs
  charge_energy_col: charge_kwh
  quantiles:
    - 0.00
    - 0.05
    - 0.50
    - 0.95
    - 1.00
  refresh_col: is_refresh
  location_col: location
  refresh_locations:
    - depot
  summary_cols:
    delay_frac: delay_frac
    shift_dur: shift_dur_hrs
    shift_dur_delayed: shift_dur_delayed_hrs
    shift_dur_delayed_thresh: shift_dur_delayed_past_FMCSA
    shift_delay: shift_delay_hrs
    max_delay: max_delay_hrs
  death_rate_col: pct_shifts_w_deaths_addressable
  drop_events_col: drop_events_all_reasons
  electrified_col: electrified
  delay_frac_thresh_quantile: 0.95
  max_delay_thresh_quantile: 1.00
  shift_max_dur_hrs: 14  # FMCSA maximum on-duty driving window (hours)
  thresholds:
    # Acceptability thresholds for vehicle operability. Observed vehicles which exceed
    # these thresholds in a given scenario are flagged as infeasible (charging infrastructure
    # insufficient to support electrification without unacceptable disruption).
    pct_shifts_w_deaths_max: 0.05  # Maximum fraction of shifts with range failures from any cause
    delay_frac_max: 0.1            # Maximum fraction of a single shift added by charging delay
    delay_hrs_max: 8               # Maximum accumulated delay (hours) at any point in a vehicle's history

localize_time_from_hexes:
  time_cols_source:
    - time
  time_cols_local:
    - time_local
  get_tz: False
  sort_result: False
  sort_cols:
    - veh_id
    - time_local

apply_delays:
  delay_columns:
    cumul_hrs: dwell_init_delay_hrs
    increase_hrs: delay_inc_hrs
    decrease_hrs: delay_dec_hrs
    dwell_hrs: dwell_time_hrs
  delay_unit: hour

filter_dwells_pre_prob_eval:
  filter_out_weekends: True  # Load profiles represent typical weekdays; weekend dwells are excluded
  drop_na_cols:
    - loc_group_id  # Dwells at unclassified hexes are excluded from probability estimation
    - charge_kwh    # Dwells with NaN charging are not counted as electrified

filter_locs_pre_prob:
  drop_na_cols:
    - loc_group_id
    - substation_id

dwell_scaling:
  loc_class_cols:
    - loc_group_id
  veh_class_cols:
    - primary_op_dist
  electrified_col: electrified
  dwell_rate_col: dwells_per_time_unit

compute_adoption_totals:
  totals_column: n_vehs_target
  fuel_type_col: fuel_type
  electrified_fuel_types:
    - electricity
  filter_totals:
    # Selects the NLR "Central" scenario at 2035 as the adoption baseline.
    # Modify ``year`` to project a different horizon year (2030, 2040, etc.).
    # Modify ``scenario`` to use NLR "High" or "Low" adoption projections.
    # This filtering is bypassed when override_with_params is True.
    filters:
      gvw_class:
        value_isin:
          - "8"
      scenario:
        value_isin:
          - Central
      is_mandate_active:
        value_isin:
          - False
      year:
        value_isin:
          - 2035
    keep_only_filter_cols: False
  override_with_params: True   # When True, adoption_fracs below are used directly and NLR projections are ignored.
                                # Set to False to use NLR Ledna projections filtered by filter_totals above.
                                # In paper scenarios this is overridden per-SoW via scenario configs.
  adoption_fracs:
    # Used only when override_with_params is True.
    id_columns:
      - primary_op_dist
    values:
      0-99 Miles: 0.2
      100-249 Miles: 0.2
      250-499 Miles: 0.2
      500+ Miles: 0.2

compute_dwell_rate_vclass:
  time_unit: ${slice_events.slice_freq}
  filter_out_weekends: ${filter_dwells_pre_prob_eval.filter_out_weekends}
  dwell_count_col: n_dwells
  obs_dur_cols:
    start: obs_time_first
    end: obs_time_last
  target_vehs_col: ${compute_adoption_totals.totals_column}
  dwell_rate_col: ${compute_class_probs.columns.dwell_rate}

merge_classes:
  keep_right_columns:
    - primary_op_dist
    - ${compute_class_probs.columns.dwell_rate}
    - ${compute_class_probs.columns.n_vehs_in_class}
    - ${compute_class_probs.columns.n_vehs_electrified_in_class}
  merge_kwargs:
    how: left
    'on': ${dwell_scaling.veh_class_cols}  # Using quotes here because "on" somehow gets interpreted as "True" without quotes

compute_class_probs:
  loc_class_cols:
    - loc_group_id
  veh_class_cols:
    - primary_op_dist
  columns:
    n_dwells_obs: n_dwells_obs
    n_dwells_obs_elect: n_dwells_electrified
    n_vehs_in_class: ${compute_adoption_totals.totals_column}
    n_vehs_electrified_in_class: n_vehs_electrified
    dwell_rate: dwell_rate
  out_columns:
    prob_obs_elect: p_obs_elect_g_lclass_vclass
    n_elect_dwells_expected: n_dwells_expected_elect

get_dwells_nonzero:
  charge_col: charge_kwh

manage_charging:
  charging_manager: MinPowerChargingManager
  drop_na_cols:
    - charge_kwh
  input_cols:  # Keys must match the keyword arguments of the charging manager
    energy: charge_kwh
    duration: dwell_time_hrs
    max_power: max_power_kw
    id_cols:
      - ${eval_columns.dw_col}
      - ${eval_columns.hex_col}
      - ${eval_columns.timezone_col}
  round_decimals: 4

build_slice_frame:
  columns_input:
    first_hex: obs_hex_first
    first_time: obs_time_first
    last_hex: obs_hex_last
    last_time: obs_time_last
  freq: 1d
  frame_cols:
    vehicle: veh_id
    time: slice_time_start

eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  dw_col: dwell_id
  timezone_col: tz
  time_col: time
  charge_col: charge_kwh
  group_cols: None  # Filled in at runtime by the modular pipeline configuration
  profile_cols:     # profile_cols and diff_cols must have the same set of keys
    power: power_kw
    plugged: plugged
  diff_cols:
    power: power_kw_diff
    plugged: plugged_diff
  cum_cols:
    power: energy_kwh
    plugged: plugged_hrs
  peak_cols:
    power: peak_kw
    plugged: plugged_peak
  util_cols:
    power: util_energy
    plugged: util_plugs
  duration_col: duration

substation.group_columns:
  - substation_id

county.group_columns:
  - county_code

stratify_columns:
  - loc_group_id
  - primary_op_dist

assign_metadata_location:
  keep_right_columns:
    - hex_id
    - ${eval_columns.timezone_col}
    # Other columns will be added at runtime
  merge_kwargs:
    how: left
    'on': hex_id  # Using quotes here because "on" somehow gets interpreted as "True" without quotes
    validate: many_to_one

assign_metadata_vehicle:
  keep_right_columns:
    - veh_id
    - electrified
    # Other columns will be added at runtime
  merge_kwargs:
    how: left
    'on': veh_id  # Using quotes here because "on" somehow gets interpreted as "True" without quotes
    validate: many_to_one

merge_dwell_probs:
  keep_right_columns:
    - loc_group_id
    - primary_op_dist
    - p_obs_elect_g_lclass_vclass
  merge_kwargs:
    how: left
    'on':  # Using quotes here because "on" somehow gets interpreted as "True" without quotes
      - loc_group_id
      - primary_op_dist

slice_events:
  slice_freq: 1d
  clip_dur_to_slice_freq: True
  slice_id_col: slice_time_start
  slice_time_col: slice_time_relative
  source_time_col: time_local

dask_eval:
  cluster:
    n_workers: 3           # Set to (available CPU cores - 1); fewer workers reduces peak memory
    processes: True        # Must be True; code is not proven thread-safe
    threads_per_worker: 1  # See previous comment
    memory_limit: 16GiB    # Tune to available RAM; the loading of the dwells into memory is the most memory-intensive step

sample_profiles:
  # Bootstrap sampling configuration for load profile assembly (Module 6).
  # Each bootstrap draw samples a set of electrified dwells proportional to
  # adoption rates, then assembles a 30-minute load profile per TAZ.
  # The 95th percentile across bootstraps is used as the policy-relevant peak.
  discrete_freq: 30min       # Load profile time resolution; 30-minute intervals
  slice_freq: ${slice_events.slice_freq}
  n_bootstraps: 100         # Number of bootstrap draws; ~10 seconds per bootstrap on HPC for the full dataset.
  save_bootstrap_profiles: False  # Set to True to retain full per-bootstrap DataFrames for debugging (high memory cost)
  master_seed: 42
  bootstrap_id_col: bootstrap_id
  sample_self: True
  sample_class: True
  max_first_stage_options: 5000  # Maximum candidate dwells considered in first-stage sampling; higher values improve profile smoothness
  dwell_prob_obs_elect_col: p_obs_elect_g_lclass_vclass
  n_dwells_expected_elect_col: n_dwells_expected_elect
  time_col: ${slice_events.slice_time_col}
  loc_group_col: loc_group_id
  summary_suffixes:
    cumul: _cuml
    peak: _peak
  quantiles:
    # Quantiles of the bootstrap distribution saved per substation.
    # The 0.95 quantile ("duty-to-serve-robust" policy) is the primary metric in the paper (§4.1).
    - 0.00
    - 0.05
    - 0.40
    - 0.50
    - 0.60
    - 0.95
    - 1.00

calc_utilization:
  slice_freq: ${slice_events.slice_freq}
  dur_unit: 1h
