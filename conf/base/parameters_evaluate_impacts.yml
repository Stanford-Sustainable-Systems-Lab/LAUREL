# This is a boilerplate parameters config generated for pipeline 'evaluate_impacts'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

summarize_vehicles:
  dead_energy_col: dwell_init_kwh
  delay_hrs_col: dwell_init_delay_hrs
  delay_inc_hrs_col: delay_inc_hrs
  obs_duration_col: obs_duration
  dwell_dur_col: dwell_time_hrs
  charge_energy_col: charge_kwh
  quantiles:
    - 0.00
    - 0.05
    - 0.50
    - 0.95
    - 1.00
  refresh_col: is_refresh
  location_col: location
  refresh_locations:
  - depot
  summary_cols:
    delay_frac: delay_frac
    shift_dur: shift_dur_hrs
    shift_dur_delayed: shift_dur_delayed_hrs
    shift_dur_delayed_thresh: shift_dur_delayed_past_FMCSA
    shift_delay: shift_delay_hrs
    max_delay: max_delay_hrs
  death_rate_col: pct_shifts_w_deaths_addressable
  drop_events_col: drop_events_all_reasons
  electrified_col: electrified
  delay_frac_thresh_quantile: 0.95
  max_delay_thresh_quantile: 1.00
  shift_max_dur_hrs: 14 # From FMCSA hours of service regulations
  thresholds:
    pct_shifts_w_deaths_max: 0.05 # Maximum percentage of shifts with deaths from all causes
    delay_frac_max: 0.1 # Maximum time fraction of a single shift added by delay
    delay_hrs_max: 8 # Maximum accumulated delay at any point in vehicle's history

localize_time_from_hexes:
  time_cols_source:
    - time
  time_cols_local:
    - time_local
  get_tz: False
  sort_result: False
  sort_cols:
    - veh_id
    - time_local

apply_delays:
  delay_columns:
    cumul_hrs: dwell_init_delay_hrs
    increase_hrs: delay_inc_hrs
    decrease_hrs: delay_dec_hrs
    dwell_hrs: dwell_time_hrs
  delay_unit: hour

filter_dwells_pre_prob_eval:
  filter_out_weekends: True
  drop_na_cols:
    - loc_group_id # This is okay, since everything from here on out is one dwell at a time
    - charge_kwh # Any dwells with NaN charging should not be counted as electrified

filter_locs_pre_prob:
  drop_na_cols:
   - loc_group_id
   - substation_id

dwell_scaling:
  loc_class_cols:
    - loc_group_id
  veh_class_cols:
    - primary_op_dist
    #- vin_gvw
  electrified_col: electrified
  dwell_rate_col: dwells_per_time_unit
  

compute_adoption_totals:
  totals_column: n_vehs_target
  fuel_type_col: fuel_type
  electrified_fuel_types:
    - electricity
  filter_totals:
    filters:
      gvw_class:
        value_isin:
          - "8"
      scenario:
        value_isin:
          - Central
      is_mandate_active:
        value_isin:
          - False
      year:
        value_isin:
          - 2035
    keep_only_filter_cols: False
  override_with_params: True
  adoption_fracs:
    id_columns:
      - primary_op_dist
    values:
      0-99 Miles: 0.2
      100-249 Miles: 0.2
      250-499 Miles: 0.2
      500+ Miles: 0.2

compute_dwell_rate_vclass:
  time_unit: ${slice_events.slice_freq}
  filter_out_weekends: ${filter_dwells_pre_prob_eval.filter_out_weekends}
  dwell_count_col: n_dwells
  obs_dur_cols:
    start: obs_time_first
    end: obs_time_last
  target_vehs_col: ${compute_adoption_totals.totals_column}
  dwell_rate_col: ${compute_class_probs.columns.dwell_rate}

merge_classes:
  keep_right_columns:
    - primary_op_dist
    - ${compute_class_probs.columns.dwell_rate}
    - ${compute_class_probs.columns.n_vehs_in_class}
    - ${compute_class_probs.columns.n_vehs_electrified_in_class}
  merge_kwargs:
    how: left
    'on': ${dwell_scaling.veh_class_cols} # Using quotes here because "on" somehow gets interpreted as "True" without quotes

compute_class_probs:
  loc_class_cols:
    - loc_group_id
  veh_class_cols:
    - primary_op_dist
    #- vin_gvw
  columns:
    n_dwells_obs: n_dwells_obs
    n_dwells_obs_elect: n_dwells_electrified
    n_vehs_in_class: ${compute_adoption_totals.totals_column}
    n_vehs_electrified_in_class: n_vehs_electrified
    dwell_rate: dwell_rate
  out_columns:
    prob_obs_elect: p_obs_elect_g_lclass_vclass
    n_elect_dwells_expected: n_dwells_expected_elect

get_dwells_nonzero:
  charge_col: charge_kwh

manage_charging:
  charging_manager: MinPowerChargingManager
  drop_na_cols:
    - charge_kwh
  input_cols: # keys should match the keyword arguments of the charging manager
    energy: charge_kwh
    duration: dwell_time_hrs
    max_power: max_power_kw
    id_cols:
      - ${eval_columns.dw_col}
      - ${eval_columns.hex_col}
      - ${eval_columns.timezone_col}
  round_decimals: 4

build_slice_frame:
  columns_input:
    first_hex: obs_hex_first
    first_time: obs_time_first
    last_hex: obs_hex_last
    last_time: obs_time_last
  freq: 1d
  frame_cols:
    vehicle: veh_id
    time: slice_time_start

eval_columns:
  hex_col: hex_id
  veh_col: veh_id
  dw_col: dwell_id
  timezone_col: tz
  time_col: time
  charge_col: charge_kwh
  group_cols: None # Filled in by the specific modular pipeline settings
  profile_cols: # profile_cols and diff_cols must have the same set of keys
    power: power_kw
    plugged: plugged
  diff_cols:
    power: power_kw_diff
    plugged: plugged_diff
  cum_cols:
    power: energy_kwh
    plugged: plugged_hrs
  peak_cols:
    power: peak_kw
    plugged: plugged_peak
  util_cols:
    power: util_energy
    plugged: util_plugs
  duration_col: duration

substation.group_columns:
  - substation_id

county.group_columns:
  - county_fips

stratify_columns:
  - loc_group_id
  - primary_op_dist

assign_metadata_location:
  keep_right_columns:
    - hex_id
    - ${eval_columns.timezone_col}
    # Other columns will be added at runtime
  merge_kwargs:
    how: left
    'on': hex_id # Using quotes here because "on" somehow gets interpreted as "True" without quotes
    validate: many_to_one

assign_metadata_vehicle:
  keep_right_columns:
    - veh_id
    - electrified
    # Other columns will be added at runtime
  merge_kwargs:
    how: left
    'on': veh_id # Using quotes here because "on" somehow gets interpreted as "True" without quotes
    validate: many_to_one

merge_dwell_probs:
  keep_right_columns:
    - loc_group_id
    - primary_op_dist
    - p_obs_elect_g_lclass_vclass
  merge_kwargs:
    how: left
    'on': # Using quotes here because "on" somehow gets interpreted as "True" without quotes
      - loc_group_id
      - primary_op_dist

slice_events:
    slice_freq: 1d
    clip_dur_to_slice_freq: True
    slice_id_col: slice_time_start
    slice_time_col: slice_time_relative
    source_time_col: time_local

dask_eval:
  cluster:
    n_workers: 4
    processes: True
    threads_per_worker: 1 # Must stay at 1, since our code is not thread safe
    memory_limit: 16GiB # TODO: explore if this could be decreased by moving Dask farther along in pipeline (after filtering steps)

sample_profiles:
  discrete_freq: 30min
  slice_freq: ${slice_events.slice_freq}
  n_bootstraps: 100 # As of 10/6/2025, 100 is about the maximum possible on Fletcher's laptop (because of summarization memory load)
  master_seed: 42
  bootstrap_id_col: bootstrap_id
  sample_self: True
  sample_class: True
  max_first_stage_options: 2000 # TODO: Test this value to see if it impacts profiles much. Higher should provide more smoothness, lower should give faster runtime.
  dwell_prob_obs_elect_col: p_obs_elect_g_lclass_vclass
  n_dwells_expected_elect_col: n_dwells_expected_elect
  time_col: ${slice_events.slice_time_col}
  loc_group_col: loc_group_id
  summary_suffixes:
    cumul: _cuml
    peak: _peak
  quantiles:
    - 0.00
    - 0.05
    - 0.40
    - 0.50
    - 0.60
    - 0.95
    - 1.00

calc_utilization:
  slice_freq: ${slice_events.slice_freq}
  dur_unit: 1h