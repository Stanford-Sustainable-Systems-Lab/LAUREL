# This is a boilerplate parameters config generated for pipeline 'evaluate_impacts'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

summarize_vehicles:
  dead_energy_col: dwell_init_kwh

profiles_from_dwells:
  charging_manager: ImmediateChargingManager
  input_cols: # keys should match the keyword arguments of the charging manager
    energy: charge_kwh
    duration: dwell_time_hrs
    max_power: max_power_kw
    region: substation_id
  profile_col: power_kw
  duration_col: duration

report_by_hex:
  id_cols:
    location: substation_id
    time: time
  power_col: power_kw
  timezone_col: tz
  local_time_attrs:
    - day_of_week
    - hour