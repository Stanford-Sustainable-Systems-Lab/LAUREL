# This is a boilerplate parameters config generated for pipeline 'build_scenario_runners'
# using Kedro 0.19.5.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.5/configuration/parameters.html

slurm_command: local # Valid values are "sbatch" and "salloc"

slurm_reporting:
  output: slurm_logs/%x.%j.out # Note use of * wildcard to be replaced with job-name, which comes in from 
  error: slurm_logs/%x.%j.err
  mail-user: passow@stanford.edu
  mail-type: ALL

slurm_resources:
  partition: serc
  mem: 32GB # Increasing memory, since I've had some memory errors
  ntasks: 2 # I believe that this is what we need for SequentialRunner, while ParallelRunner needs n_examples + 1
  cpus-per-task: 32 # Upping cpus per task since we can't parallelize as wide between tasks
  gpus: 0
  time: 0-04:00 # Reducing time requirement, since with more processors we're going faster.
  array: 1-60%2 # 2 at a time is enforced by Gurobi license

cmd_line_calls:
  prefix: rye run
  kedro:
    # pipeline: simulate
    # params: Use this for command line parameters

scenario_params:
  name: test

results_partition:
  dir: test/task_0 # Don't include suffix, since this is handled by the catalog.yml