# Parameters for the ``compute_routes`` pipeline (Model Module 2: Augment Dwell Data).
#
# This pipeline inserts optional truck-stop dwells along shortest-path routes.
# For each trip longer than ``min_dist_miles``, it checks whether any public
# truck stop falls within ``park_buffer_miles`` of the GraphHopper shortest-path
# route. If so, a dwell is inserted at that truck stop. This grew the observed
# dwell count by ~35% in the paper's dataset.
#
# Routing is parallelized across Dask workers. The pipeline manages GraphHopper
# container lifecycle (startup, import, serving, shutdown) automatically.
#
# Container runtime:
#   - On HPC systems (no Docker daemon): use ApptainerContainerRunner and point
#     ``image`` at a pre-built Apptainer sandbox (.sif directory). See the HPC
#     Execution section of README.md for how to build the sandbox.
#   - On local machines with Docker: switch ``container_class`` to
#     ``laurel.models.routing.server.DockerContainerRunner`` and set ``image``
#     to a Docker image name (e.g. ``israelhikingmap/graphhopper:10.0``).
#
# Documentation: https://docs.kedro.org/en/stable/configuration/parameters.html

filter_routable_trips:
  drop_cols:
    - veh_type
    - vin_gvw
  dist_col: trip_miles
  min_dist_miles: 50   # Only route trips longer than this; shorter trips are unlikely to pass a truck stop en route
  debug_subsample:
    active: False  # Set to True and reduce frac to speed up development runs
    frac: 0.01

get_trip_orig_dest_points:
  hex_geo_cols:  # Format is target_col: source_col
    orig_point: starting_h3_8
    dest_point: ending_h3_8
  output_geom_col: orig_point

partition_trips:
  # Tune n_partitions to balance memory per worker against parallelism.
  # At 250 partitions the full dataset yields ~32,000 rows per partition.
  # Increase partitions (smaller batches) if workers run out of memory.
  n_partitions: 6000

dask_routing:
  cluster:
    n_workers: 4           # Tune to available CPU cores
    processes: True        # Must be True; code is not proven thread-safe
    threads_per_worker: 1
    memory_limit: 8GiB     # Tune to available RAM per worker

graphhopper:
  # Switch container_class to use Docker on local machines (no Apptainer):
  #   laurel.models.routing.server.DockerContainerRunner
  # Keep ApptainerContainerRunner for HPC/Linux environments.
  image: containers/graphhopper_10.2.sif               # Path to Apptainer sandbox, or Docker image name for DockerContainerRunner
  container_class: laurel.models.routing.server.ApptainerContainerRunner
  map_path: $SCRATCH/north-america-latest.osm.pbf      # Path to OSM .osm.pbf file; $SCRATCH is an HPC env var — replace with an absolute path on local systems
  graph_dir: $SCRATCH/graphhopper_cache/north-america/ # Pre-built GraphHopper graph cache; populate via scripts/setup/02b_import_graph.sh
  config_path: ./conf/base/parameters_graphhopper.yml
  resources:
    import:
      mem_max_gb: 160         # Memory for initial graph import; reduce if routing a smaller geographic area
      mem_start_gb: 160       # Set equal to mem_max_gb (see GraphHopper memory docs)
      startup_delay_secs: 5
    server:
      mem_max_gb: 64          # Memory to serve the loaded graph; must be ≥ 64 GB for the full continental U.S.
      mem_start_gb: 64        # Set equal to mem_max_gb
      startup_delay_secs: 15  # Empirically the minimum safe delay; increase if server startup times out

get_routes:
  profile: car   # GraphHopper routing profile; "car" approximates truck road access for continental routing
  client:
    max_concurrent_requests: 20
    batch_size: 5000
    timeout_secs: 60
    verbose: True
  input_cols:
    orig: orig_point
    dest: dest_point
  output_trip_cols:
    dist: trip_miles_route
    dur: trip_hrs_route
    speed: trip_speed_route_mph

filter_opt_stops:
  filters:
    loc_group_id:
      value_isin:
        - truck_stop  # Only insert optional dwells at truck-stop TAZs
  keep_only_filter_cols: False

format_opt_stop_locations:
  col_renamer:
    hex_id_park: hex_id
  columns:
    park_id: park_id
    hex: hex_id_park
    park_point: park_point
  keep_cols:
    - park_id
    - hex_id_park
    - park_point

get_optional_stop_trips:
  projected_crs: EPSG:5072    # Albers Equal Area Conic (CONUS); used for accurate distance-to-route calculations
  park_buffer_miles: 1.0      # A truck stop must be within this distance of the route to be considered reachable
  columns:
    route_geom: trip_geom_route
    park_point: geometry  # Renamed from "park_point" by save and load to GeoPackage
    dist_along_miles: dist_along_miles
    hex_park: hex_id_park
    hex_end: ending_h3_8
    is_optional: is_optional
  drop_cols_initial:
    - orig_point
    - dest_point
  progress_report_interval_secs: 10

describe_optional_stop_trips:
  park_buffer_miles: 1.0  # Must match get_optional_stop_trips.park_buffer_miles
  columns:
    dist_along_miles: dist_along_miles
    miles_route: trip_miles_route
    miles_orig: trip_miles
    hours_route: trip_hrs_route
    hours_orig: trip_hrs
    speed_route: trip_speed_route_mph
    is_optional: is_optional
    start_time: start_timestamp_utc
    end_time: end_timestamp_utc
  trip_id_cols:
    - veh_id
    - end_timestamp_utc
  rename_cols_final:  # Values here are the names of internal columns
    start_timestamp_utc: new_start
    end_timestamp_utc: new_end
    trip_miles: trip_miles_route_seg
    trip_hrs: trip_hrs_route_seg
  keep_cols_final:
    - veh_id
    - start_timestamp_utc
    - end_timestamp_utc
    - starting_h3_8
    - ending_h3_8
    - trip_miles
    - trip_hrs

concat_optional_stops:
  drop_cols:
    - veh_type
    - vin_gvw
  trip_id_cols:
    - veh_id
    - end_timestamp_utc
  dist_col: trip_miles
  n_partitions: 300  # For saving out to Parquet
