# This is a boilerplate parameters config generated for pipeline 'compute_routes'
# using Kedro 0.19.3.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.3/configuration/parameters.html

filter_routable_trips:
  drop_cols:
    - veh_type
    - vin_gvw
  dist_col: trip_miles
  min_dist_miles: 50
  debug_subsample:
    active: False
    frac: 0.01

get_trip_orig_dest_points:
  hex_geo_cols: # Format is target_col: source_col
    orig_point: starting_h3_8
    dest_point: ending_h3_8
  output_geom_col: orig_point

partition_trips:
  n_partitions: 6000 # Care must be taken to tune this to match the routing system memory
  # Currently, 250 partitions yields about 32000 rows per partition

dask_routing:
    cluster:
        n_workers: 4
        processes: True
        threads_per_worker: 1
        memory_limit: 8GiB

graphhopper:
    image: containers/graphhopper_10.2.sif
    container_class: megaPLuG.models.routing.server.ApptainerContainerRunner
    map_path: $SCRATCH/north-america-latest.osm.pbf
    graph_dir: $SCRATCH/graphhopper_cache/north-america/
    config_path: ./conf/base/parameters_graphhopper.yml
    resources:
        import:
            mem_max_gb: 160
            mem_start_gb: 160
            startup_delay_secs: 5
        server:
            mem_max_gb: 64 # 8 is not enough to load the US, but 10 is
            mem_start_gb: 64 # I learned from the following link that setting memory to be the same is important: https://www.graphhopper.com/blog/2022/06/27/host-your-own-worldwide-route-calculator-with-graphhopper/
            startup_delay_secs: 15 # This is quite close to the shortest possible

get_routes:
    profile: car
    client:
        max_concurrent_requests: 20
        batch_size: 5000
        timeout_secs: 60
        verbose: True
    input_cols:
        orig: orig_point
        dest: dest_point
    output_trip_cols:
        dist: trip_miles_route
        dur: trip_hrs_route
        speed: trip_speed_route_mph

filter_opt_stops:
  filters:
    loc_group_id:
      value_isin:
        - truck_stop
  keep_only_filter_cols: False

format_opt_stop_locations:
  col_renamer:
    hex_id_park: hex_id
  columns:
    park_id: park_id
    hex: hex_id_park
    park_point: park_point
  keep_cols:
    - park_id
    - hex_id_park
    - park_point

get_optional_stop_trips:
  projected_crs: EPSG:5072
  park_buffer_miles: 1.0
  columns:
    route_geom: trip_geom_route
    park_point: geometry # Renamed from "park_point" by save and load to GeoPackage
    dist_along_miles: dist_along_miles
    hex_park: hex_id_park
    hex_end: ending_h3_8
    is_optional: is_optional
  drop_cols_initial:
    - orig_point
    - dest_point
  progress_report_interval_secs: 10

describe_optional_stop_trips:
  park_buffer_miles: 1.0
  columns:
    dist_along_miles: dist_along_miles
    miles_route: trip_miles_route
    miles_orig: trip_miles
    hours_route: trip_hrs_route
    hours_orig: trip_hrs
    speed_route: trip_speed_route_mph
    is_optional: is_optional
    start_time: start_timestamp_utc
    end_time: end_timestamp_utc
  trip_id_cols:
    - veh_id
    - end_timestamp_utc
  rename_cols_final: # Values here are the names of internal columns
    start_timestamp_utc: new_start
    end_timestamp_utc: new_end
    trip_miles: trip_miles_route_seg
    trip_hrs: trip_hrs_route_seg
  keep_cols_final:
    - veh_id
    - start_timestamp_utc
    - end_timestamp_utc
    - starting_h3_8
    - ending_h3_8
    - trip_miles
    - trip_hrs

concat_optional_stops:
  drop_cols:
    - veh_type
    - vin_gvw
  trip_id_cols:
    - veh_id
    - end_timestamp_utc
  dist_col: trip_miles
