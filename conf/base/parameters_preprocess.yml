# This is a boilerplate parameters config generated for pipeline 'preprocess'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

format_columns:
  time_columns:
    - start_timestamp_utc
    - end_timestamp_utc
  category_columns:
    - veh_type
    - vin_gvw
  h3_columns:
    - starting_h3_8
    - ending_h3_8
  persist: True

strip_vehicle_attrs:
  col_renamer:
    veh_id: vehicle_id
  veh_id_col: veh_id
  veh_attr_cols:
    - veh_type
    - vin_gvw
  persist: True

trip_derived_cols:
  time_cols:
    trip_start: start_timestamp_utc
    trip_end: end_timestamp_utc
  persist: True

create_dwells:
  debug_subsample:
    active: False
    n: 1000
  drop_cols:
    - starting_h3_8
  col_renamer:
    hex_id: ending_h3_8
  from_trips_cols:
    veh: veh_id
    hex: hex_id
    start_trip: start_timestamp_utc
    end_trip: end_timestamp_utc
    trip_dist: trip_miles
    trip_dur: trip_hrs
  load_into_memory: True

get_vius_by_home_base_state:
  col_renamer:
    home_base_state: HBSTATE_LABEL
    n_vehs: VCOUNT
    veh_miles: VMILE
    avg_miles_per_veh: AMILE
  multipliers:
    n_vehs: 1000
    veh_miles: 1000000
  index_col: home_base_state

get_vius_by_weight_class:
  col_renamer:
    gvw_class: GVWR_LABEL
    n_vehs: VCOUNT
    veh_miles: VMILE
    avg_miles_per_veh: AMILE
  multipliers:
    n_vehs: 1000
    veh_miles: 1000000
  index_col: gvw_class

clean_vius_by_home_base_state:
  drop_idx_values:
    - No Home Base
    - Not Reported
  replace_values:
    Massachussetts: Massachusetts # Correcting spelling

clean_vius_by_weight_class:
  drop_idx_values:
    - Any Gross Vehicle Weight Rating Class

build_vius_scaling_totals:
  totals_col: n_vehs
  weight_col: weight
  id_cols:
    region: home_base_state
    weight_class: gvw_class

format_substation_profiles:
  col_renamer:
    substation_id: SubID
  columns:
    substation_id: substation_id
    month_hour: MonthHour
    month: month
    hour: time_local_hour
    baseload: High

format_substation_capacities:
  col_renamer:
    substation_id: substationid
  substation_id: substation_id
  capacity: facilityratingmw
    

describe_substation_usage:
  columns:
    substation_id: substation_id
    hour: time_local_hour
    baseload_mw: max_base_by_hour_mw
    rating_mw: rating_mw
    cap_avail_mw: cap_avail_mw
