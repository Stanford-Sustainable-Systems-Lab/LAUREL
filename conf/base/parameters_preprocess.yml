# This is a boilerplate parameters config generated for pipeline 'preprocess'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

format_columns:
  time_columns:
    - start_timestamp_utc
    - end_timestamp_utc
  category_columns:
    - veh_type
    - vin_gvw
  h3_columns:
    - starting_h3_8
    - ending_h3_8
  persist: True

strip_vehicle_attrs:
  col_renamer:
    veh_id: vehicle_id
  veh_id_col: veh_id
  veh_attr_cols:
    - veh_type
    - vin_gvw
  persist: True

trip_derived_cols:
  time_cols:
    trip_start: start_timestamp_utc
    trip_end: end_timestamp_utc
  persist: True

create_dwells:
  debug_subsample:
    active: False
    n: 1000
  load_into_memory: True
  drop_cols:
    - starting_h3_8
  col_renamer:
    hex_id: ending_h3_8
  from_trips_cols:
    veh: veh_id
    hex: hex_id
    start_trip: start_timestamp_utc
    end_trip: end_timestamp_utc
    trip_dist: trip_miles
    trip_dur: trip_hrs
