# This is a boilerplate parameters config generated for pipeline 'preprocess'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

format_columns:
  time_columns:
    - start_timestamp_utc
    - end_timestamp_utc
  category_columns:
    - veh_type
    - vin_gvw
  h3_columns:
    - starting_h3_8
    - ending_h3_8
  persist: True

strip_vehicle_attrs:
  col_renamer:
    veh_id: vehicle_id
  veh_id_col: veh_id
  veh_attr_cols:
    - veh_type
    - vin_gvw
  min_trips_per_veh: 2
  persist: True

trip_derived_cols:
  time_cols:
    trip_start: start_timestamp_utc
    trip_end: end_timestamp_utc
  persist: True

create_dwells:
  debug_subsample:
    active: False
    n: 1000
  drop_cols:
    - starting_h3_8
  col_renamer:
    hex_id: ending_h3_8
  from_trips_cols:
    veh: veh_id
    hex: hex_id
    start_trip: start_timestamp_utc
    end_trip: end_timestamp_utc
    trip_dist: trip_miles
    trip_dur: trip_hrs
  load_into_memory: True

get_vius_by_home_base_state:
  col_renamer:
    home_base_state: HBSTATE_LABEL
    n_vehs: VCOUNT
    veh_miles: VMILE
    avg_miles_per_veh: AMILE
  multipliers:
    n_vehs: 1000
    veh_miles: 1000000
  index_col: home_base_state

get_vius_by_weight_class:
  col_renamer:
    gvw_class: GVWR_LABEL
    n_vehs: VCOUNT
    veh_miles: VMILE
    avg_miles_per_veh: AMILE
  multipliers:
    n_vehs: 1000
    veh_miles: 1000000
  index_col: gvw_class

clean_vius_by_home_base_state:
  drop_idx_values:
    - Any State (including No Home Base and Not Reported)
  replace_values:
    Massachussetts: Massachusetts # Correcting spelling

clean_vius_by_weight_class:
  drop_idx_values:
    - Any Gross Vehicle Weight Rating Class

build_vius_scaling_totals:
  col_renamer:
    tab_weight: TABWEIGHT
    gvw_class: GVWR_CLASS
    reg_state: REGSTATE
    cab_day: CABDAY
  totals_col: tab_weight
  home_source_col: HBSTATE
  cab_source_col: cab_day
  id_cols:
    region: home_base_state
    weight_class: gvw_class
    cab_day: cab_day
  home_base_corresp:
    id_columns:
      - ${build_vius_scaling_totals.home_source_col}
    values:
      "61": "Home Base in Register State"
      "62": "Home Base not in Register State"
      "63": "No Home Base"
      "64": "Not Reported"
      "X": "Not In Use"
  cab_type_corresp:
    id_columns:
      - ${build_vius_scaling_totals.cab_source_col}
    values:
      "1": "Day Cab"
      "2": "Sleeper Cab"
      "4": "Not Reported"
      "X": "Not a Tractor Truck"