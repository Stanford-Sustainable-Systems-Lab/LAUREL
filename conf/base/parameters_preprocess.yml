# This is a boilerplate parameters config generated for pipeline 'preprocess'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

format_columns:
  time_columns:
    - start_timestamp_utc
    - end_timestamp_utc
  category_columns:
    - veh_type
    - vin_gvw
  h3_columns:
    - starting_h3_8
    - ending_h3_8
  persist: True

create_dwells:
  debug_subsample:
    active: False
    n: 1000
  load_into_memory: True
  drop_cols:
    - starting_h3_8
    - veh_type
    - vin_gvw
  col_renamer:
    hex_id: ending_h3_8
    veh_id: vehicle_id
  from_trips_cols:
    veh: veh_id
    hex: hex_id
    start_trip: start_timestamp_utc
    end_trip: end_timestamp_utc
    dist: trip_miles
  persist: False

consump_rate:
  coord_ref_sys: 4326
  allow_sess_idle_time_hrs: 0.25
  min_drive_sess_length_hrs: 0.05
  max_drive_sess_length_hrs: 24
  min_drive_sess_dist_miles: 0.5

charge_sessions:
  max_charge_gap_secs: 3600 # Longest gap in a charging session allowable before a new session is counted
  truck_ids_to_drop:
    - 8
  max_possible_charger_power_kw: 37