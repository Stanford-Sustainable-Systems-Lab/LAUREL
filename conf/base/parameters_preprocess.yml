# This is a boilerplate parameters config generated for pipeline 'preprocess'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

format_columns:
  time_columns:
    - start_timestamp_utc
    - end_timestamp_utc
  category_columns:
    - vehicle_id
    - veh_type
    - vin_gvw
  h3_columns:
    - starting_h3_8
    - ending_h3_8
  col_renamer:
    veh_id: vehicle_id
  veh_id_col: veh_id
  persist: False

strip_vehicle_attrs:
  veh_id_col: veh_id
  veh_attr_cols:
    - veh_type
    - vin_gvw
  min_trips_per_veh: 2

filter_routable_trips:
  drop_cols:
    - end_timestamp_utc
    - veh_type
    - vin_gvw
  dist_col: trip_miles
  min_dist_miles: 50
  debug_subsample:
    active: True
    frac: 0.01

get_trip_orig_dest_points:
  hex_geo_cols: # Format is target_col: source_col
    orig_point: starting_h3_8
    dest_point: ending_h3_8
  output_geom_col: orig_point

partition_trips:
  n_partitions: 1500 # Care must be taken to tune this to match the routing system memory
  # Currently, 250 partitions yields about 32000 rows per partition

dask_routing:
    cluster:
        n_workers: 4
        processes: True
        threads_per_worker: 1
        memory_limit: 4GiB

graphhopper:
    image: containers/graphhopper_10.2.sif
    container_class: megaPLuG.models.routing.server.ApptainerContainerRunner
    map_path: $SCRATCH/us-latest.osm.pbf
    graph_dir: $SCRATCH/graphhopper_cache/us/
    config_path: ./conf/base/parameters_graphhopper.yml
    resources:
        import:
            mem_max_gb: 96
            mem_start_gb: 96
            startup_delay_secs: 5
        server:
            mem_max_gb: 48 # 8 is not enough to load the US, but 10 is
            mem_start_gb: 48 # I learned from the following link that setting memory to be the same is important: https://www.graphhopper.com/blog/2022/06/27/host-your-own-worldwide-route-calculator-with-graphhopper/
            startup_delay_secs: 15 # This is quite close to the shortest possible

get_routes:
    profile: car
    client:
        max_concurrent_requests: 20
        batch_size: 5000
        timeout_secs: 60
        verbose: True
    input_cols:
        orig: orig_point
        dest: dest_point
    output_trip_cols:
        dist: trip_miles_route
        dur: trip_hrs_route
        speed: trip_speed_route_mph


trip_derived_cols:
  time_cols:
    trip_start: start_timestamp_utc
    trip_end: end_timestamp_utc
  persist: True

create_dwells:
  debug_subsample:
    active: False
    n: 1000
  drop_cols:
    - starting_h3_8
    - veh_type
    - vin_gvw
  col_renamer:
    hex_id: ending_h3_8
  from_trips_cols:
    veh: veh_id
    hex: hex_id
    start_trip: start_timestamp_utc
    end_trip: end_timestamp_utc
    trip_dist: trip_miles
    trip_dur: trip_hrs
  load_into_memory: True

get_vius_by_home_base_state:
  col_renamer:
    home_base_state: HBSTATE_LABEL
    n_vehs: VCOUNT
    veh_miles: VMILE
    avg_miles_per_veh: AMILE
  multipliers:
    n_vehs: 1000
    veh_miles: 1000000
  index_col: home_base_state

get_vius_by_weight_class:
  col_renamer:
    gvw_class: GVWR_LABEL
    n_vehs: VCOUNT
    veh_miles: VMILE
    avg_miles_per_veh: AMILE
  multipliers:
    n_vehs: 1000
    veh_miles: 1000000
  index_col: gvw_class

clean_vius_by_home_base_state:
  drop_idx_values:
    - Any State (including No Home Base and Not Reported)
  replace_values:
    Massachussetts: Massachusetts # Correcting spelling

clean_vius_by_weight_class:
  drop_idx_values:
    - Any Gross Vehicle Weight Rating Class

build_vius_scaling_totals:
  col_renamer:
    tab_weight: TABWEIGHT
    gvw_class: GVWR_CLASS
    reg_state: REGSTATE
    cab_day: CABDAY
  totals_col: tab_weight
  home_source_col: HBSTATE
  cab_source_col: cab_day
  id_cols:
    region: home_base_state
    weight_class: gvw_class
    cab_day: cab_day
  home_base_corresp:
    id_columns:
      - ${build_vius_scaling_totals.home_source_col}
    values:
      "61": "Home Base in Register State"
      "62": "Home Base not in Register State"
      "63": "No Home Base"
      "64": "Not Reported"
      "X": "Not In Use"
  cab_type_corresp:
    id_columns:
      - ${build_vius_scaling_totals.cab_source_col}
    values:
      "1": "Day Cab"
      "2": "Sleeper Cab"
      "4": "Not Reported"
      "X": "Not a Tractor Truck"