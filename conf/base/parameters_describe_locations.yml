# This is a boilerplate parameters config generated for pipeline 'describe_locations'
# using Kedro 0.19.3.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.3/configuration/parameters.html

govt_areas:
  filters:
    STUSPS:
      value_isin:
        - CA
  keep_only_filter_cols: True

highways:
  filters:
    JURISNAME:
      value_isin:
        - California
  keep_only_filter_cols: True

urban_areas:
  area_name_col: NAME20
  state_codes:
    - CA

land_use:
  crs: EPSG:5070
  highway_buffer_miles: 5
  land_use_col: land_use

analysis_areas:
  crs: EPSG:5070

get_hexes_by_area:
  group_cols_renamer:
    state: STUSPS
    substation_id: substationid
    land_use: land_use
  hex_col: hex_id

get_timezones:
  hex_col: hex_id