# This is a boilerplate parameters config generated for pipeline 'describe_locations'
# using Kedro 0.19.3.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.3/configuration/parameters.html

# For California substations
format_substations_pg_and_e:
  col_renamer:
    substation_id: substationid
    substation_name: substationname
    rating_mw: facilityratingmw
  substation_id: substation_id
  capacity: facilityratingmw
  add_state_col:
    name: state_code
    value: CA
  add_source_col:
    name: source
    value: pg_and_e

format_substation_profiles:
  col_renamer:
    substation_id: SubID
  columns:
    substation_id: substation_id
    month_hour: MonthHour
    month: month
    hour: time_local_hour
    baseload: High

describe_substation_usage:
  drop_substation_cols:
    - geometry
  columns:
    substation_id: substation_id
    hour: time_local_hour
    baseload_mw: max_base_by_hour_mw
    rating_mw: rating_mw
    cap_avail_mw: cap_avail_mw

pg_and_e.geo_partition:
  dir: pg_and_e

# For continental substations
format_substations_contin:
  col_renamer:
    substation_id: id
    substation_name: name
  add_source_col:
    name: source
    value: hifld
  keep_cols:
    - substation_id
    - substation_name
    - source
    - geometry

substations.select_columns:
  keep_cols:
    - substation_id

filter_contin_subs:
  filters:
    status:
      value_isin:
        - IN SERVICE
        - NOT AVAILABLE
        - UNDER CONSTRUCTION
    type:
      value_isin:
        - SUBSTATION
        - NOT AVAILABLE
  keep_only_filter_cols: False

fill_out_substations:
  columns:
      substation_id: substation_id
      source: source
  proj_crs: ${clip_to_extent.crs}
  buff_dist_meters: 1000

continental.geo_partition:
  dir: continental

# For supporting datasets
format_states:
  col_renamer:
    state_code: STUSPS
    state_name: STATE_NAME
    county_code: COUNTYNS

states.select_columns:
  keep_cols:
    - state_code
    - county_code

filter_state_codes:
  filters:
    state_code:
      value_isin:
        - GU
        - MP
        - PR
        - AK
        - HI
        - VI
        - AS
        - BC
        - SK
        - AB
      invert: True
  keep_only_filter_cols: False

format_urban:
  col_renamer:
    urban_area: NAME20

urban_areas.select_columns:
  keep_cols:
    - urban_area

format_highways:
  col_renamer:
    road_num: ROADNUM
  dissolve_cols:
    - road_num
  highway_buffer_miles: 5
  buff_crs: ${clip_to_extent.crs}

highways.select_columns:
  keep_cols:
    - road_num

clip_to_extent:
  crs: EPSG:5070

hexify_polygons:
  hex_col: hex_id
  n_partitions: 1

get_timezones:
  hex_col: ${hexify_polygons.hex_col}

fill_missingness:
  drop_na_cols:
    - state_code
    - tz
  fill_na_vals:
    road_num: far_from_highway
    urban_area: non_urban

format_estabs:
  col_renamer:
    estab_id: ESTAB_ID
    name: COMPANY
    naics_8: PRIMARY_NAICS_CODE
    n_employees: EMPLOYEE_SIZE__5____LOCATION
    business_status_code: BUSINESS_STATUS_CODE
    parent_id: PARENT_NUMBER
    state: STATE
    lat: LATITUDE
    lon: LONGITUDE
  default_naics: 99999001
  calculated_keep_cols:
    - hex_id
    - geometry

prepare_stop_locations_public:
  naics_code: 44719002 # An unused NAICS code in Data Axle
  col_renamer:
    name: NHS Rest S
  columns:
    naics: naics_8
  keep_cols:
    - name
    - naics_8
    - geometry

get_osm_estabs:
  osm_path: data/01_raw/OpenStreetMap/us-251029.osm.pbf
  temp_path: data/01_raw/OpenStreetMap/temp_reader.osm.pbf

get_osm_estabs_truck_stops:
  naics_code: 44719007
  tag_regex: "\\b(?:love'?s(?:\\s+travel\\s+stops?)?|pilot(?:\\s+travel\\s+center)?|flying\\s+j|pilot\\s+flying\\s+j|ta(?:\\s+travel\\s+center)?|road\\s+ranger|sapp\\s+bros?\\.?)\\b"
  naics_col: ${format_extra_estabs.naics_col}

get_osm_estabs_warehouses:
  naics_code: 49311000
  tag_regex: "\\b(?:distribution|fulfillment|fulfilment|logistics|freight|returns?|return|order|e-?commerce)\\s+(?:center|centre|facility|hub|park|warehouse)\\b"
  naics_col: ${format_extra_estabs.naics_col}

format_extra_estabs:
  naics_col: naics_8
  hex_col: hex_id
  name_col: name
  proj_crs: ${clip_to_extent.crs}

reassign_hqs:
  columns:
    naics: naics_8
    parent_id: parent_id
    n_employees: n_employees
    estab_id: estab_id
    buss_status: business_status_code
  emp_ratio_min: 5 # Minimum ratio of n_employees at this establishment compared to median of parent company for this to be considered an HQ
  hq_bus_codes: # Business status codes corresponding to HQs
    - 1
  n_estabs_big: 20 # The minimum number of establishments within a parent to be considered "big" and viable for HQ replacement
  naics_window: # Window of NAICS values for which replacement can occur
    lower: 40000000
    upper: 50000000
  hq_naics: 55111201 # Replacement NAICS for HQs - Offices of other holding companies

collapse_naics_classes:
  naics_cols:
    raw: naics_8
    out: naics_focus
    leaf: naics_leaf
  fill_leaf: 0
  
pivot_hex_estabs:
  columns:
    n_employees: n_employees
    naics: naics_focus
    hex_id: hex_id
    geom: geometry
  keep_metadata_cols:
    - state
  zero_emp_buff: 1 # Number of "fake" employees to add to establishments without employees
  naics_prefix: naics_

pivot_hex_land_use:
  input_cols:
    categories: unique
    fractions: frac
    hex: hex_id
  code_group_corresp: # Values are my groupings, comments are original meaning
    11: wild # open_water
    12: wild # ice_snow
    21: developed # developed_open
    22: developed # developed_low
    23: developed # developed_med
    24: developed # developed_high
    31: wild # barren_land
    41: wild # forest_deciduous
    42: wild # forest_evergreen
    43: wild # forest_mixed
    52: wild # shrub_scrub
    71: wild # grassland
    81: cultivated # pasture_hay
    82: cultivated # cultivated_crops
    90: wild # woody_wetlands
    95: wild # emergent_herbaceous_wetlands

group_hexes:
  development:
    col: developed
    frac_thresh: 0.025
  naics_prefix: ${pivot_hex_estabs.naics_prefix}
  default_naics: 0
  special_naics:
    truck_stop: 44719007
    truck_park: 44719002
  clusterer_kwargs:
    n_clusters: 18 # Optimized for lowest exceedance of threshold probability
    random_state: 42
    init: k-means++
    verbose: 1 # Scikit-learn uses an integer system for verbosity, with 0 being no prints
  loc_group_col: loc_group_id

apply_groups:
  hex_col: hex_id
  group_col: ${group_hexes.loc_group_col}