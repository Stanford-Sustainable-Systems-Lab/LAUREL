# This is a boilerplate parameters config generated for pipeline 'describe_locations'
# using Kedro 0.19.3.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.3/configuration/parameters.html

# For California substations
format_substations_pg_and_e:
  col_renamer:
    substation_id: substationid
    substation_name: substationname
    rating_mw: facilityratingmw
  substation_id: substation_id
  capacity: facilityratingmw
  add_state_col:
    name: state_code
    value: CA

format_substation_profiles:
  col_renamer:
    substation_id: SubID
  columns:
    substation_id: substation_id
    month_hour: MonthHour
    month: month
    hour: time_local_hour
    baseload: High

describe_substation_usage:
  drop_substation_cols:
    - geometry
  columns:
    substation_id: substation_id
    hour: time_local_hour
    baseload_mw: max_base_by_hour_mw
    rating_mw: rating_mw
    cap_avail_mw: cap_avail_mw

pg_and_e.geo_partition:
  dir: pg_and_e

# For continental substations
format_substations_contin:
  col_renamer:
    substation_id_contin: id
  proj_crs: ${clip_to_extent.crs}

subs_contin.select_columns:
  keep_cols:
    - substation_id_contin

filter_contin_subs:
  filters:
    status:
      value_isin:
        - IN SERVICE
        - NOT AVAILABLE
        - UNDER CONSTRUCTION
    type:
      value_isin:
        - SUBSTATION
        - NOT AVAILABLE
  keep_only_filter_cols: False

continental.geo_partition:
  dir: continental

# For supporting datasets
format_states:
  col_renamer:
    state_code: STUSPS
    state_name: NAME

states.select_columns:
  keep_cols:
    - state_code

filter_state_codes:
  filters:
    state_code:
      value_isin:
        - GU
        - MP
        - PR
        - AK
        - HI
        - VI
        - AS
        - BC
        - SK
        - AB
      invert: True
  keep_only_filter_cols: False

format_urban:
  col_renamer:
    urban_area: NAME20

urban_areas.select_columns:
  keep_cols:
    - urban_area

format_highways:
  col_renamer:
    road_num: ROADNUM
  dissolve_cols:
    - road_num
  highway_buffer_miles: 5
  buff_crs: ${clip_to_extent.crs}

highways.select_columns:
  keep_cols:
    - road_num

clip_to_extent:
  crs: EPSG:5070

hexify_polygons:
  hex_col: hex_id
  n_partitions: 1

get_timezones:
  hex_col: ${hexify_polygons.hex_col}

fill_missingness:
  drop_na_cols:
    - state_code
    - tz
  fill_na_vals:
    road_num: far_from_highway
    urban_area: non_urban

format_estabs:
  col_renamer:
    estab_id: ESTAB_ID
    name: COMPANY
    naics_8: PRIMARY_NAICS_CODE
    n_employees: EMPLOYEE_SIZE__5____LOCATION
    business_status_code: BUSINESS_STATUS_CODE
    parent_id: PARENT_NUMBER
    state: STATE
    lat: LATITUDE
    lon: LONGITUDE
  default_naics: 99999001
  calculated_keep_cols:
    - hex_id
    - geometry

reassign_hqs:
  columns:
    naics: naics_8
    parent_id: parent_id
    n_employees: n_employees
    estab_id: estab_id
    buss_status: business_status_code
  emp_ratio_min: 5 # Minimum ratio of n_employees at this establishment compared to median of parent company for this to be considered an HQ
  hq_bus_codes: # Business status codes corresponding to HQs
    - 1
  n_estabs_big: 20 # The minimum number of establishments within a parent to be considered "big" and viable for HQ replacement
  naics_window: # Window of NAICS values for which replacement can occur
    lower: 40000000
    upper: 50000000
  hq_naics: 55111201 # Replacement NAICS for HQs - Offices of other holding companies

collapse_naics_classes:
  naics_cols:
    raw: naics_8
    out: naics_focus
    leaf: naics_leaf
  
embed_hexes:
  columns:
    n_employees: n_employees
    naics: naics_focus
    hex_id: hex_id
    geom: geometry
  keep_metadata_cols:
    - state
  zero_emp_buff: 1 # Number of "fake" employees to add to establishments without employees
  naics_prefix: naics_
  include_neighbors: True
  neighbor_merge_suffix: _ngbr

cluster_hexes:
  cluster_col: cluster_id
  naics_prefix: naics_
  ngbr_suffix: _ngbr
  features:
    include_own_naics: True
    include_ngbr_naics: True
    other_features: # Leaving nothing here implies a value of None
  scaler_kwargs:
    with_mean: True
    with_std: True
  clusterer_kwargs:
    n_clusters: 50 #500
    random_state: 42
    init: k-means++
    verbose: 1 # Scikit-learn uses an integer system for verbosity, with 0 being no prints

apply_clusters:
  hex_col: hex_id
  clust_col: cluster_id
  fill_cluster: False
  fill_cluster_value: ${cluster_hexes.clusterer_kwargs.n_clusters} # Fill with max(clust_id) + 1