# Parameters for the ``build_scenarios`` pipeline (scenario management / HPC execution).
#
# This pipeline generates two artifacts for each scenario family:
#   1. Per-task Kedro config overrides in conf/scenarios/<name>/task_<id>/parameters.yml
#   2. A SLURM batch script in scripts/<name>.sh (or a local run script)
#
# Each "task" corresponds to one state of the world (SoW). The SLURM array index
# maps to the task_id parameter used by electrify_trips and evaluate_impacts.
#
# To generate scenario configs and scripts, run:
#   kedro run --pipeline=build_scenarios --env=build_scenarios/<scenario_name>
#
# slurm_command controls the execution environment:
#   "local"  — run directly on the current machine (no scheduler); useful for
#              single-SoW runs and development
#   "sbatch" — submit to a SLURM cluster as a batch job array
#   "salloc" — submit to SLURM as an interactive allocation
#
# Documentation: https://docs.kedro.org/en/stable/configuration/parameters.html

slurm_command: local  # Valid values are "local", "sbatch", and "salloc"

slurm_reporting:
  output: logs/slurm/%x_%A_%a.log
  mail-user: YOUR_EMAIL@institution.edu  # Replace with your email for SLURM job notifications
  mail-type: ALL

# A note on selecting job times:
# In job arrays, the startup processes for Kedro within each job compete for shared resources.
# The exact identity of these shared resources is not yet known. However, we have empirically
# found that it takes about 35 seconds to process through each Kedro job. Therefore,
# if you are using a job array, increase your estimated time by 35 seconds times the array width.
slurm_resources:
  partition: serc          # SLURM partition name; replace with your cluster's partition (e.g. "normal", "gpu")
  ntasks: 2                # Kedro SequentialRunner requires 2 tasks; increase for ParallelRunner (n_parallels + 1)
  cpus-per-task: 2
  mem-per-cpu: 16GB        # Tune to your cluster; each SoW requires ~64 GB total (4 cores × 16 GB)
  gpus: 0
  time: 0-01:00            # Wall-clock limit; each SoW runs in ~25 minutes; 1 hour gives generous headroom
  array: 1-60%2            # Array range and concurrency limit; adjust to match the number of SoWs

cmd_line_calls:
  prefix: uv run
  kedro:
    # pipeline: simulate
    # params: Use this for command line parameters

scenario_params:
  builder: TestScenarioBuilder
  display_name: test