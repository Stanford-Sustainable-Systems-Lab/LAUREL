# This is a boilerplate parameters config generated for pipeline 'build_runners'
# using Kedro 0.19.5.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.5/configuration/parameters.html

slurm_command: local # Valid values are "sbatch" and "salloc"

slurm_reporting:
  output: logs/slurm/%x_%A_%a.log
  mail-user: passow@stanford.edu
  mail-type: ALL

# A note on selecting job times:
# In job arrays, the startup processes for Kedro within each job compete for shared resources.
# The exact identity of these shared resources is not yet known. However, we have empirically
# found that it takes about 35 seconds to process through each Kedro job. Therefore,
# if you are using a job array, increase your estimated time by 35 seconds times the array width.
slurm_resources:
  partition: serc
  ntasks: 2 # Kedro needs this for its SequentialRunner, while ParallelRunner needs n_parallels + 1
  cpus-per-task: 1
  mem-per-cpu: 16GB
  gpus: 0
  time: 0-04:00
  array: 1-60%2

cmd_line_calls:
  prefix: uv run
  kedro:
    # pipeline: simulate
    # params: Use this for command line parameters

scenario_params:
  builder: TestScenarioBuilder
  display_name: test