# Parameters for the ``electrify_trips`` pipeline (Model Module 4: Simulate Electrified Dwells).
#
# This pipeline runs the utility-maximization charging choice algorithm for each
# vehicle's full dwell history. For each dwell it selects a charging mode (depot,
# destination, truck stop, or none) and energy amount, accumulating delay when
# charging needs cannot be met within the dwell window.
#
# Key parameters (charging mode power levels, SoC buffer, battery reserve) are
# intentionally set to baseline values here. In the paper's sense_512 scenario set,
# these are overridden per-SoW via conf/scenarios/<name>/task_*/parameters.yml,
# which is generated by the build_scenarios pipeline.
#
# Dask is used for parallelism. The code is NOT proven thread-safe, so
# ``processes: True`` and ``threads_per_worker: 1`` are required.
#
# Documentation: https://docs.kedro.org/en/stable/configuration/parameters.html

load_dwell_set:
  veh: veh_id
  hex: hex_id
  start: dwell_start_time
  end: dwell_end_time
  trip_dist: trip_miles
  trip_dur: trip_hrs
  reset: reset_state_before
  verify_sorting: False

dask_electrify_trips:
  use_dask: True
  cluster:
    n_workers: 4           # Tune to available CPU cores
    processes: True        # Must be True; code is not proven thread-safe
    threads_per_worker: 1  # Must stay at 1; do not increase
    memory_limit: 8GiB     # Tune to available RAM; 8 GiB works for typical fleet sizes on a laptop
  n_partitions: 300        # Tune to available RAM; 300 works well for ~69,000 vehicles on 64 GB

filter_vehicles:
  # Restricts simulation to the desired weight classes. By default, only Class 8
  # (heavy-duty) vehicles are simulated, matching the paper's scope.
  # Remove or modify the vin_gvw filter to include other weight classes.
  filters:
    vin_gvw:
      value_isin:
        - 8   # Class 8 (heavy-duty, GVWR > 33,000 lbs); remove to include lighter classes
    # home_base_state:   # Uncomment to restrict to a specific state
    #   value_isin:
    #     - CA
    # home_base_hex:     # Uncomment to restrict to a specific hex
    #   value_isin:
    #     - 613222834799378431
  keep_only_filter_cols: False

vehicles:
  consump_rate_kwh_per_mi:
    # Baseline energy consumption rates by operating distance class and GVW class.
    id_columns:
      - primary_op_dist
      - vin_gvw
    values:
      0-99 Miles:
        6: 1.25
        7: 1.25
        8: 2.0   # kWh/mile; Class 8 baseline (paper uses 1.4–2.0 kWh/mile range across SoWs)
      100-249 Miles:
        6: 1.25
        7: 1.25
        8: 2.0
      250-499 Miles:
        6: 1.25
        7: 1.25
        8: 2.0
      500+ Miles:
        6: 1.25
        7: 1.25
        8: 2.0
  minimum_times:
    plug_in_mins: 5    # Minimum time required to plug in (minutes); added to effective dwell duration
    plug_out_mins: 5   # Minimum time required to unplug (minutes); added to effective dwell duration
    plug_io_hrs: 0.1667
  initial_soc:
    alpha: 5   # Beta distribution shape parameter for initial SoC; symmetric (alpha = beta = 5) gives mean = 0.5
    beta: 5    # Represents uncertainty about SoC at the start of the observation period
  soc_buffer_low: 0.2   # Minimum target SoC (fraction); vehicles avoid charging below this level. Overridden per-SoW.
  soc_buffer_high: 0.8  # Maximum target SoC (fraction); vehicles avoid charging above this level. Overridden per-SoW.
  min_soc_charge: 0.01  # Minimum fractional battery fill per charging session; sessions adding less than this are skipped even if it risks a range failure
  max_delay_recoverable_hrs: ${summarize_vehicles.thresholds.delay_hrs_max}  # Matches the operability threshold in evaluate_impacts
  random_seed:
    master_seed: 42     # Master RNG seed; each vehicle gets a derived seed based on this and their ID
    seed_id_col: veh_id

calc_vehicle_ranges:
  columns:
    shift: shift_id
    range_mi: range_mi
    consump_kwh_per_mi: consump_rate_kwh_per_mi
    batt_kwh: battery_capacity_kwh
  no_death_shift_frac: 0.99  # 99% of shifts must complete without a range failure ("death")
  no_charge_shift_frac: 0.5  # 50% of shifts must be completable without any mid-shift charging
  soc_buffer_low: ${vehicles.soc_buffer_low}
  soc_buffer_high: ${vehicles.soc_buffer_high}
  range_options_miles:  # Discrete design ranges available; from Ledna et al. (2022) BEV range tiers
    - 150
    - 300
    - 500

merge_vehicle_params:
  keep_right_columns:
    - veh_id
    - consump_rate_kwh_per_mi
    - minimum_times_plug_in_mins
    - minimum_times_plug_out_mins
    - battery_capacity_kwh
  merge_kwargs:
    how: left
    'on':
      - veh_id

calc_dwell_durations:
  dwell_time_col: dwell_time_hrs
  in_out_time_cols:
    plug_in: minimum_times_plug_in_mins
    plug_out: minimum_times_plug_out_mins
  in_out_time_unit: minute

charging_modes:
  # Baseline charger power levels by mode. These are overridden per-SoW in the paper:
  none:
    max_power_kw: 0
  enroute:
    max_power_kw: 150      # Destination charging (non-depot, non-truck-stop); overridden per-SoW
  depot:
    max_power_kw: 350      # Depot charging; overridden per-SoW
  truck_stop:
    max_power_kw: 1000     # Public truck-stop fast charging; overridden per-SoW
  name_column: mode_name
  id_column: charge_mode_id

assign_modes:
  # Determines which charging modes are available at each dwell based on location type
  # and vehicle behavior. Depot mode availability also depends on a rolling dwell-time
  # ratio threshold (veh_based_mode_avail), reflecting that only vehicles that regularly
  # use a location as a depot have depot chargers deployed there.
  mode_col: ${charging_modes.name_column}
  loc_group_col: loc_group_id
  loc_based_mode_avail:
    enroute:
      loc_groups:
        - undeveloped
        - no_estabs
        - some_estabs
      invert_selection: True   # Available at all location types EXCEPT those listed
    truck_stop:
      loc_groups:
        - truck_stop
      invert_selection: False  # Available only at truck_stop location type
    depot:
      loc_groups:
        - undeveloped
      invert_selection: True   # Available everywhere except undeveloped hexes
    none: True                 # Always available (no charging is always an option)
  veh_based_mode_avail:
    # Depot charging is only available if the vehicle spends a large fraction of
    # its time at this location (rolling dwell ratio above threshold).
    mode_name: depot
    ratio_thresh: 0.2
    ratio_col: max_dwell_hrs_roll_ratio
  mode_mask_col: avail_modes_bool
  max_power_col: max_power_kw_avail
  max_power_source_col: max_power_kw

calc_energy_use:
  consump_col: consump_rate_kwh_per_mi
  energy_col: energy_use_kwh

mark_critical_days:
  loc_col: location
  dur_col: dwell_time_hrs
  max_power_col: max_power_kw_avail
  refresh_col: is_refresh
  crit_bound_col: is_critical_boundary
  crit_col: is_critical
  batt_cap_col: battery_capacity_kwh
  energy_col: energy_use_kwh
  energy_col_next_trip: energy_use_kwh_next
  energy_col_remain_shift: energy_use_kwh_shift

filter_dwells:
  filter_critical_days: True  # Filters out all optional truck-stop dwells on days where range is critically tight
  filter_cols:
    refresh: is_refresh
    crit: is_critical
  dwell_time_col: dwell_time_hrs
  accum_cols_forward_extra:
    - energy_use_kwh
  accum_cols_reverse:
    - energy_use_kwh_next
  drop_cols:
    - minimum_times_plug_in_mins
    - minimum_times_plug_out_mins
    - consump_rate_kwh_per_mi
    - battery_capacity_kwh
    - ${assign_modes.loc_group_col}
    - ${assign_modes.veh_based_mode_avail.ratio_col}

mark_shift_powers:
  refresh_col: is_refresh
  crit_col: is_critical
  max_power_col: max_power_kw_avail
  max_power_col_shift: max_power_kw_avail_shift_w_skips
  final_value: 0
  fill_value: ${charging_modes.enroute.max_power_kw}

simulate_charging_choice:
  precompile: False  # Set to True to pre-compile Numba JIT functions before the main loop (speeds up repeated runs)
  input_cols:
    consumed_kwh: energy_use_kwh
    consumed_kwh_next: energy_use_kwh_next
    consumed_kwh_shift: energy_use_kwh_shift
    power_kw_shift_max_remaining: max_power_kw_avail_shift_w_skips
    max_delay_recoverable_hrs: max_delay_recoverable_hrs
    dwell_hrs: dwell_time_hrs
    modes_avail: avail_modes_bool
    avail_kw: max_power_kw
    refresh: is_refresh
    reset: reset_state_before
    critical: is_critical
    batt_cap: battery_capacity_kwh
    random_seed: random_seed
    rng_alpha: initial_soc_alpha
    rng_beta: initial_soc_beta
    soc_buffer_low: soc_buffer_low
    soc_buffer_high: soc_buffer_high
    min_soc_charge: min_soc_charge
    plug_in_and_out_delay_hrs: minimum_times_plug_io_hrs
  drop_cols:
    - avail_modes_bool
    - max_power_kw_avail

assign_scale_up_factor:
  apply_scaling: False  # Scaling is handled via adoption rates in evaluate_impacts, not here
  veh_cols:
    - weight

merge_chosen_mode:
  keep_right_columns:
    - charge_mode_id
    - max_power_kw
  merge_kwargs:
    how: left
    "on": charge_mode_id

filter_dwells_post:
  filter_unused_optionals: True  # Removes optional truck-stop dwells where the vehicle chose not to charge
  filter_cols:
    charge: charge_kwh
  accum_cols_forward_extra:  # None implicitly
  accum_cols_reverse:        # None implicitly
  drop_cols:
    - energy_use_kwh
    - energy_use_kwh_next
    - energy_use_kwh_shift
    - max_power_kw_avail_shift_w_skips
    - is_critical
