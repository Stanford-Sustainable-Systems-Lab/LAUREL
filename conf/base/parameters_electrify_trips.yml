# This is a boilerplate parameters config generated for pipeline 'electrify_trips'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

load_dwell_set:
  veh: veh_id
  hex: hex_id
  start: dwell_start_time
  end: dwell_end_time
  trip_dist: trip_miles
  trip_dur: trip_hrs
  reset: reset_state_before
  verify_sorting: False

dask_electrify_trips:
  use_dask: True
  cluster:
    n_workers: 4
    processes: True
    threads_per_worker: 1 # Must stay at 1, since our code is not thread safe
    memory_limit: 8GiB
  n_partitions: 300 # 300 works well for the full continental on a laptop

filter_vehicles:
  filters:
    vin_gvw:
      value_isin:
        - 8
    # home_base_state:
    #   value_isin:
    #     - CA
    # home_base_hex:
    #   value_isin:
    #     - 613222834799378431
  keep_only_filter_cols: False

merge_vehicle_params:
  keep_right_columns:
    - veh_id
    - consump_rate_kwh_per_mi
    - minimum_times_plug_in_mins
    - minimum_times_plug_out_mins
    - battery_capacity_kwh
  merge_kwargs:
    how: left
    'on':
      - veh_id

calc_dwell_durations:
  dwell_time_col: dwell_time_hrs
  in_out_time_cols:
    plug_in: minimum_times_plug_in_mins
    plug_out: minimum_times_plug_out_mins
  in_out_time_unit: minute

vehicles:
  battery_capacity_kwh:
    id_columns:
      - primary_op_dist
      - vin_gvw
    values:
      0-99 Miles:
        6: 400
        7: 400
        8: 1000
      100-249 Miles:
        6: 400
        7: 400
        8: 1000
      250-499 Miles:
        6: 400
        7: 400
        8: 1000
      500+ Miles:
        6: 400
        7: 400
        8: 1000
  consump_rate_kwh_per_mi:
    id_columns:
      - primary_op_dist
      - vin_gvw
    values:
      0-99 Miles:
        6: 1.25
        7: 1.25
        8: 2.0
      100-249 Miles:
        6: 1.25
        7: 1.25
        8: 2.0
      250-499 Miles:
        6: 1.25
        7: 1.25
        8: 2.0
      500+ Miles:
        6: 1.25
        7: 1.25
        8: 2.0
  minimum_times:
    plug_in_mins: 5
    plug_out_mins: 5
    plug_io_hrs: 0.1667
  initial_soc:
    alpha: 5
    beta: 5
  soc_buffer_low: 0.1
  soc_buffer_high: 0.8
  min_soc_charge: 0.01 # No charging session is allowed which fills less than this fraction of the battery, even if this results in death
  max_delay_recoverable_hrs: ${summarize_vehicles.thresholds.delay_hrs_max}
  random_seed:
    master_seed: 42 # Each vehicle gets their own seed based on this one and their ID
    seed_id_col: veh_id

charging_modes:
  none:
    max_power_kw: 0
  enroute:
    max_power_kw: 150
  depot:
    max_power_kw: 350
  truck_stop:
    max_power_kw: 1000
  name_column: mode_name
  id_column: charge_mode_id

assign_modes:
  mode_col: ${charging_modes.name_column}
  loc_group_col: loc_group_id
  loc_based_mode_avail:
    enroute:
      loc_groups: # Location groups under 18 clusters (random state 42) which have more than 5 visits/day average
        - clust_7
        - clust_16
        - clust_12
        - clust_10
        - clust_8
        - clust_11
        - clust_15
        - clust_5
        - clust_13
        - clust_9
        - truck_park
      invert_selection: False
    truck_stop:
      loc_groups:
        - truck_stop
      invert_selection: False
    depot:
      loc_groups:
        - undeveloped
      invert_selection: True
    none: True
  veh_based_mode_avail:
    mode_name: depot
    ratio_thresh: 0.2
    ratio_col: max_dwell_hrs_roll_ratio
  mode_mask_col: avail_modes_bool
  max_power_col: max_power_kw_avail
  max_power_source_col: max_power_kw

mode_location_corresp:
  charge_modes_avail:
    id_columns:
      - location
    values:
      depot:
        - none
        - depot
      truck_stop:
        - none
        - truck_stop
      other:
        - none
        - enroute
    value_col: avail_modes
  value_col_bool: avail_modes_bool
  loc_col: location
  max_power_col: max_power_kw_avail
  max_power_source_col: max_power_kw

calc_energy_use:
  consump_col: consump_rate_kwh_per_mi
  energy_col: energy_use_kwh

mark_shift_refreshes:
  columns:
    refresh: is_refresh
    dur: dwell_time_hrs
  min_refresh_hrs: 6.9 # The minimum sleep time from FMCSA (7hrs) minus a fudge factor

mark_critical_days:
  loc_col: location
  dur_col: dwell_time_hrs
  max_power_col: max_power_kw_avail
  refresh_col: is_refresh
  crit_bound_col: is_critical_boundary
  crit_col: is_critical
  batt_cap_col: battery_capacity_kwh
  energy_col: energy_use_kwh
  energy_col_next_trip: energy_use_kwh_next
  energy_col_remain_shift: energy_use_kwh_shift

filter_dwells:
  filter_critical_days: True # This will filter out all optional dwells on critical days
  filter_cols:
    refresh: is_refresh
    crit: is_critical
  dwell_time_col: dwell_time_hrs
  accum_cols_forward_extra:
    - energy_use_kwh
  accum_cols_reverse:
    - energy_use_kwh_next
  drop_cols:
    - minimum_times_plug_in_mins
    - minimum_times_plug_out_mins
    - consump_rate_kwh_per_mi
    - battery_capacity_kwh
    - ${assign_modes.loc_group_col}
    - ${assign_modes.veh_based_mode_avail.ratio_col}

mark_shift_powers:
  refresh_col: is_refresh
  crit_col: is_critical
  max_power_col: max_power_kw_avail
  max_power_col_shift: max_power_kw_avail_shift_w_skips
  final_value: 0
  fill_value: ${charging_modes.enroute.max_power_kw}

simulate_charging_choice:
  precompile: False
  input_cols:
    consumed_kwh: energy_use_kwh
    consumed_kwh_next: energy_use_kwh_next
    consumed_kwh_shift: energy_use_kwh_shift
    power_kw_shift_max_remaining: max_power_kw_avail_shift_w_skips
    max_delay_recoverable_hrs: max_delay_recoverable_hrs
    dwell_hrs: dwell_time_hrs
    modes_avail: avail_modes_bool
    avail_kw: max_power_kw
    refresh: is_refresh
    reset: reset_state_before
    critical: is_critical
    batt_cap: battery_capacity_kwh
    random_seed: random_seed
    rng_alpha: initial_soc_alpha
    rng_beta: initial_soc_beta
    soc_buffer_low: soc_buffer_low
    soc_buffer_high: soc_buffer_high
    min_soc_charge: min_soc_charge
    plug_in_and_out_delay_hrs: minimum_times_plug_io_hrs
  drop_cols:
    - avail_modes_bool
    - max_power_kw_avail

assign_scale_up_factor:
  apply_scaling: False
  veh_cols:
    - weight

merge_chosen_mode:
  keep_right_columns:
    - charge_mode_id
    - max_power_kw
  merge_kwargs:
    how: left
    "on": charge_mode_id

filter_dwells_post:
  filter_unused_optionals: True # This will filter out all unused optional stops
  filter_cols:
    charge: charge_kwh
  accum_cols_forward_extra: # None implicitly
  accum_cols_reverse: # None implicitly
  drop_cols:
    - energy_use_kwh
    - energy_use_kwh_next
    - energy_use_kwh_shift
    - max_power_kw_avail_shift_w_skips
    - is_critical