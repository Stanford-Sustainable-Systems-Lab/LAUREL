# This is a boilerplate parameters config generated for pipeline 'electrify_trips'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

load_dwell_set:
  veh: veh_id
  hex: hex_id
  start: dwell_start_time
  end: dwell_end_time
  dist: trip_miles
  reset: reset_state_before

filter_dwells:
  drop_cols:
    - trip_hrs
    - trip_avg_speed_mph

veh_days:
  loc_col: location
  veh_day_col: veh_day_id
  refresh_locations:
    - home_base
  refresh_col: is_refresh
  crit_col: is_crit_day

vehicles:
  battery_capacity_kwh:
    id_columns:
      - has_home_base
      - vin_gvw
    values:
      True:
        6: 400
        7: 400
        8: 600
      False:
        6: 600
        7: 600
        8: 1200
  consump_rate_kwh_per_mi:
    id_columns:
      - has_home_base
      - vin_gvw
    values:
      True:
        6: 1.25
        7: 1.25
        8: 2.08
      False:
        6: 3.06
        7: 3.06
        8: 3.12
  minimum_time_to_charge:
    plug_in_mins: 5
    plug_out_mins: 5
    charge_time_mins: 15
  initial_soc:
    alpha: 5
    beta: 5
  charge_soc_thresh: 1.0
  master_seed: 42 # Each vehicle gets their own seed based on this one and their ID

locations:
  min_dwell_time_hrs: 0.25
  charging_rate_kw: 350

summarize_vehicles:
  dead_energy_col: dwell_start_kwh

events_from_dwells:
  seq_names:
    - dwell_start
    - dwell_end