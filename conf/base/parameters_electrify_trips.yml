# This is a boilerplate parameters config generated for pipeline 'electrify_trips'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

load_dwell_set:
  veh: veh_id
  hex: hex_id
  start: dwell_start_time
  end: dwell_end_time
  trip_dist: trip_miles
  trip_dur: trip_hrs
  reset: reset_state_before
  verify_sorting: False

filter_vehicles:
  filters:
    vin_gvw:
      value_isin:
        - 8
  keep_only_filter_cols: False

mark_substantial_dwells:
  veh_param_cols:
    plug_in: minimum_times_plug_in_mins
    plug_out: minimum_times_plug_out_mins
    batt_cap: battery_capacity_kwh
    soc_boost: dwell_min_soc_boost_frac
  max_power_col: max_power_kw
  time_cols_w_unit:
    minimum_times_plug_in_mins: minute
    minimum_times_plug_out_mins: minute
  dwell_time_col: dwell_time_hrs

mark_critical_days:
  loc_col: location
  refresh_locations:
    - home_base
  refresh_col: is_refresh
  crit_col: is_crit_day
  batt_cap_col: battery_capacity_kwh
  consump_col: consump_rate_kwh_per_mi

filter_dwells:
  filter_cols:
    substantial_soc: big_boost
    refresh: is_refresh
    crit: is_crit_day
  drop_cols:
   - range_estim

vehicles:
  battery_capacity_kwh:
    id_columns:
      - has_home_base
      - vin_gvw
    values:
      True:
        6: 400
        7: 400
        8: 600
      False:
        6: 600
        7: 600
        8: 1200
  consump_rate_kwh_per_mi:
    id_columns:
      - has_home_base
      - vin_gvw
    values:
      True:
        6: 1.25
        7: 1.25
        8: 2.08
      False:
        6: 3.06
        7: 3.06
        8: 3.12
  minimum_times:
    plug_in_mins: 5
    plug_out_mins: 5
  dwell_min_soc_boost_frac: 0.1
  initial_soc:
    alpha: 5
    beta: 5
  charge_soc_thresh: 0.5
  random_seed:
    master_seed: 42 # Each vehicle gets their own seed based on this one and their ID
    seed_id_col: veh_id

locations:
  max_power_kw:
    id_columns:
      - location
    values:
      home_base: 350
      other: 1000

calc_energy_use:
  consump_col: consump_rate_kwh_per_mi
  energy_col: energy_use_kwh

simulate_charging_choice:
  input_cols:
    consumed_kwh: energy_use_kwh
    dwell_hrs: dwell_time_hrs
    avail_kw: max_power_kw
    reset: reset_state_before_keep_dwells
    batt_cap: battery_capacity_kwh
    random_seed: random_seed
    rng_alpha: initial_soc_alpha
    rng_beta: initial_soc_beta
    charge_soc: charge_soc_thresh

assign_scale_up_factor:
  apply_scaling: False
  veh_cols:
    - weight

manage_charging:
  charging_manager: MinPowerChargingManager
  drop_na_cols:
    - charge_kwh
  input_cols: # keys should match the keyword arguments of the charging manager
    energy: charge_kwh
    duration: dwell_time_hrs
    max_power: max_power_kw
    scale_up: weight