# This is a boilerplate parameters config generated for pipeline 'electrify_trips'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

load_dwell_set:
  veh: veh_id
  hex: hex_id
  start: dwell_start_time
  end: dwell_end_time
  trip_dist: trip_miles
  trip_dur: trip_hrs
  reset: reset_state_before
  verify_sorting: False

filter_vehicles:
  filters:
    vin_gvw:
      value_isin:
        - 8
  keep_only_filter_cols: False

calc_energy_use:
  consump_col: consump_rate_kwh_per_mi
  energy_col: energy_use_kwh

mark_critical_days:
  loc_col: location
  refresh_locations:
    - depot
  refresh_col: is_refresh
  crit_col: is_crit_day
  batt_cap_col: battery_capacity_kwh
  energy_col: energy_use_kwh
  energy_col_next_trip: energy_use_kwh_next
  energy_col_remain_shift: energy_use_kwh_shift

filter_dwells:
  filter_cols:
    refresh: is_refresh
    crit: is_crit_day
  drop_cols:
   - battery_capacity_kwh
   - is_crit_day

vehicles:
  battery_capacity_kwh:
    id_columns:
      - has_home_base
      - vin_gvw
    values:
      True:
        6: 400
        7: 400
        8: 1000
      False:
        6: 600
        7: 600
        8: 1000
  consump_rate_kwh_per_mi:
    id_columns:
      - has_home_base
      - vin_gvw
    values:
      True:
        6: 1.25
        7: 1.25
        8: 2.0
      False:
        6: 3.06
        7: 3.06
        8: 2.0
  minimum_times:
    plug_in_mins: 5
    plug_out_mins: 5
  dwell_min_soc_boost_frac: 0.1
  initial_soc:
    alpha: 5
    beta: 5
  charge_soc_thresh: 0.5
  soc_buffer_low: 0.1
  soc_buffer_high: 0.8
  random_seed:
    master_seed: 42 # Each vehicle gets their own seed based on this one and their ID
    seed_id_col: veh_id

charging_modes:
  none:
    max_power_kw: 0
  depot:
    max_power_kw: 350
  enroute:
    max_power_kw: 1000
  name_column: mode_name
  id_column: mode_id

mode_location_corresp:
  charge_modes_avail:
    id_columns:
      - location
    values:
      depot:
        - none
        - depot
      other:
        - none
        - enroute
    value_col: avail_modes
  value_col_bool: avail_modes_bool

merge_avail_modes:
  keep_right_columns:
    - location
    - avail_modes_bool
  merge_kwargs:
    how: left
    'on':
      - location

simulate_charging_choice:
  input_cols:
    consumed_kwh: energy_use_kwh
    consumed_kwh_next: energy_use_kwh_next
    consumed_kwh_shift: energy_use_kwh_shift
    dwell_hrs: dwell_time_hrs
    modes_avail: avail_modes_bool
    avail_kw: max_power_kw
    refresh: is_refresh
    reset: reset_state_before
    batt_cap: battery_capacity_kwh
    random_seed: random_seed
    rng_alpha: initial_soc_alpha
    rng_beta: initial_soc_beta
    soc_buffer_low: soc_buffer_low
    soc_buffer_high: soc_buffer_high

assign_scale_up_factor:
  apply_scaling: False
  veh_cols:
    - weight

merge_chosen_mode:
  keep_right_columns:
    - mode_id
    - max_power_kw
  merge_kwargs:
    how: left
    left_on:
      - charge_mode
    right_on:
      - mode_id

apply_delays:
  delay_columns:
    cumul_hrs: dwell_init_delay_hrs
    increase_hrs: delay_inc_hrs
    decrease_hrs: delay_dec_hrs
    dwell_hrs: dwell_time_hrs
  delay_unit: hour

manage_charging:
  charging_manager: ImmediateChargingManager
  drop_na_cols:
    - charge_kwh
  input_cols: # keys should match the keyword arguments of the charging manager
    energy: charge_kwh
    duration: dwell_time_hrs
    max_power: max_power_kw
    scale_up: weight