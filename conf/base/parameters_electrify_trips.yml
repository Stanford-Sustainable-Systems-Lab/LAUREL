# This is a boilerplate parameters config generated for pipeline 'electrify_trips'
# using Kedro 0.19.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.1/configuration/parameters.html

load_dwell_set:
  veh: veh_id
  hex: hex_id
  start: dwell_start_time
  end: dwell_end_time
  dist: trip_miles
  reset: reset_state_before

vehicles:
  battery_capacity_kwh: 750
  charging_rate_kw: 350
  consump_rate_kwh_per_mi: 1.9
  charging_delays:
    plug_in_mins: 10
    plug_out_mins: 10
  initial_soc:
    alpha: 5
    beta: 5
  charge_soc_thresh: 1.0
  seed: 42

locations:
  min_dwell_time_hrs: 0.25