# This is a boilerplate parameters config generated for pipeline 'build_runners'
# using Kedro 0.19.5.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/0.19.5/configuration/parameters.html

slurm_command: sbatch # Valid values are "sbatch" and "salloc"

slurm_resources:
  partition: serc
  ntasks: 2 # I believe that this is what we need for SequentialRunner, while ParallelRunner needs n_examples + 1
  ntasks-per-node: 2 # Keeps all of the tasks and CPUs on the same node
  cpus-per-task: 2 # Using multiple CPUs takes a lot of effort (e.g. Dask cluster)
  mem: 64GB
  gpus: 0
  time: 0-04:00
  array: 0-8

cmd_line_calls:
  prefix: uv run
  kedro:
    pipeline: evaluate_impacts
    params: partition_data_dir=$SCRATCH/laurel

scenario_params:
  builder: SenseScenarioBuilder
  display_name: boot_scale
  variables:
    boot_scale:
      dist: Categorical
      params:
        - 100
        - 500
        - 1000
      path:
        - sample_profiles
        - n_bootstraps
    first_stage:
      dist: Categorical
      params:
        - 1000
        - 3000
        - 5000
      path:
        - sample_profiles
        - max_first_stage_options
