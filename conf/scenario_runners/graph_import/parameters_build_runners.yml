slurm_command: sbatch # Valid values are "sbatch" and "salloc"

slurm_reporting:
  output: slurm_logs/%x_%j.log
  mail-user: passow@stanford.edu
  mail-type: ALL

slurm_resources:
  partition: serc
  ntasks: 2 # I believe that this is what we need for SequentialRunner, while ParallelRunner needs n_examples + 1
  ntasks-per-node: 2 # Keeps all of the tasks and CPUs on the same node, thus accessible by Gurobi
  cpus-per-task: 8 # Each Gurobi thread needs one CPU to execute
  mem: 128GB # Increasing memory, since I've had some memory errors
  gpus: 0
  time: 2-00:00 # Reducing time requirement, since with more processors we're going faster.

cmd_line_calls:
  prefix: rye run
  kedro:
    pipeline: compute_routes
    tags: import
    # params: Use this for command line parameters

scenario_params:
  builder: TestScenarioBuilder
  display_name: graph_import