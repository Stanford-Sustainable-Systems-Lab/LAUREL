slurm_command: sbatch # Valid values are "sbatch" and "salloc"

slurm_reporting:
  output: slurm_logs/%x_%j.log
  mail-user: passow@stanford.edu
  mail-type: ALL

slurm_resources:
  partition: serc
  ntasks: 2 # I believe that this is what we need for SequentialRunner, while ParallelRunner needs n_examples + 1
  ntasks-per-node: 2 # Keeps all of the tasks and CPUs on the same node
  cpus-per-task: 8
  mem: 64GB
  gpus: 0
  time: 0-04:00

cmd_line_calls:
  prefix: rye run
  kedro:
    pipeline: compute_routes
    tags: route
    params: partition_data_dir=$SCRATCH/passow/megaPLuG

scenario_params:
  builder: TestScenarioBuilder
  display_name: routing