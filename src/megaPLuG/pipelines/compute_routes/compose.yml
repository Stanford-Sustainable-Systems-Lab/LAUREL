services:
  router:
    image: israelhikingmap/graphhopper:10.0
    ports:
      - 8989:8989
    volumes:
      - type: bind
        source: /data/02_intermediate/osm_graph # TODO: Get this to point to the megaPLuG/data/... not the one inside compute_routes
        target: /test # TODO: Get this to point to where the cache is actually made
    command: [
      "--url https://download.geofabrik.de/europe/andorra-latest.osm.pbf",
      "--host 0.0.0.0",
    ]