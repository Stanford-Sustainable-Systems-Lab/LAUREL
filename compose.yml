services:
  router:
    image: israelhikingmap/graphhopper:10.0
    ports:
      - 8989:8989
    volumes:
      - type: bind
        source: ./data/02_intermediate/osm_graph
        target: /data/default-gh
  importer:
    image: israelhikingmap/graphhopper:10.0
    ports:
      - 8989:8989
    volumes:
      - type: bind
        source: ./data/02_intermediate/osm_graph
        target: /data/default-gh
    # This does not work when the command is split across lines
    command: "--import --url https://download.geofabrik.de/europe/andorra-latest.osm.pbf"
